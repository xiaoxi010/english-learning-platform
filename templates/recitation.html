<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单词背诵系统</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/exam-vocab.css') }}">
<style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            
            min-height: 100vh; color: var(--text-primary);
        }
        .header {
            background: var(--bg-primary); padding: 12px 24px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-color);
        }
        .header h1 { font-size: 1.4em; color: #ffd700; }
        .back-btn {
            color: var(--text-secondary); text-decoration: none; padding: 8px 16px;
            border-radius: 20px; background: var(--bg-secondary);
        }
        .back-btn:hover { background: var(--border-color); color: var(--text-primary); }
        
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        
        .control-panel {
            background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px;
            padding: 20px; margin-bottom: 20px;
        }
        .select-row {
            display: flex; gap: 20px; margin-bottom: 15px; flex-wrap: wrap; align-items: center;
        }
        .select-group { flex: 1; min-width: 250px; }
        .select-group label {
            display: block; color: #ffd700; font-weight: bold; margin-bottom: 5px; font-size: 0.9em;
        }
        .select-group select {
            width: 100%; padding: 8px 12px; border-radius: 8px;
            background: var(--bg-secondary); color: #0d0d0d;
            border: 1px solid var(--border-color); font-size: 0.95em;
        }
        .select-group select:focus { outline: none; border-color: #ffd700; }
        
        .btn-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .btn {
            padding: 8px 18px; border: none; border-radius: 8px;
            cursor: pointer; font-size: 0.9em; font-weight: bold; transition: all 0.2s;
        }
        .btn-start { background: #ffd700; color: #0d0d0d; }
        .btn-start:hover { background: #008b74; }
        .btn-exit { background: #e74c3c; color: #0d0d0d; }
        .btn-exit:hover { background: #c0392b; }
        .btn-finish { background: #ffd700; color: #0d0d0d; }
        .btn-finish:hover { background: #5a4bd1; }
        .btn-shuffle { background: #ffd700; color: #000; }
        .btn-shuffle:hover { background: #d68910; }
        .btn-page { background: var(--bg-secondary); color: #0d0d0d; }
        .btn-page:hover { background: #2c35d4; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        
        .info-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; color: #ffd700; font-size: 0.9em; flex-wrap: wrap; gap: 10px;
        }
        
        .table-container {
            background: rgba(255,255,255,0.03); border-radius: 12px;
            overflow-x: auto; padding: 5px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 850px;
            table-layout: fixed;
        }
        th {
            background: var(--bg-card);
            padding: 10px 8px;
            font-size: 0.9em;
            position: sticky;
            top: 0;
            z-index: 1;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        th:nth-child(1) { width: 60px; }
        th:nth-child(2) { width: 160px; }
        th:nth-child(3) { width: 90px; }
        th:nth-child(4) { width: 400px; }
        th:nth-child(5) { width: 200px; }
        th:nth-child(6) { width: 70px; }

        td {
            padding: 10px 8px;
            text-align: center;
            border-bottom: 1px solid var(--bg-card);
            font-size: 0.9em;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        td:nth-child(1) { width: 60px; }
        td:nth-child(2) { width: 160px; font-weight: bold; }
        td:nth-child(3) { width: 90px; }
        td:nth-child(4) { width: 450px; }
        td:nth-child(5) { width: 150px; }
        td:nth-child(6) { width: 50px; }

        tr:hover td { background: rgba(255,255,255,0.03); }
        
        td input {
            width: 100%; padding: 6px 8px; border-radius: 6px;
            border: 2px solid var(--border-color); background: var(--bg-secondary);
            color: #0d0d0d; font-size: 0.9em; text-align: center; transition: border 0.2s;
        }
        td input:focus { outline: none; border-color: #ffd700; }
        td input.correct { border-color: #2ed573; background: rgba(46,213,115,0.1); }
        td input.wrong { border-color: #e74c3c; background: rgba(231,76,60,0.1); }
        
        .correct-text { color: #2ed573; font-weight: bold; }
        .wrong-text { color: #e74c3c; font-weight: bold; }
        .status-correct { color: #2ed573; }
        .status-wrong { color: #e74c3c; }
        
        .page-control {
            display: flex; justify-content: center; align-items: center;
            gap: 15px; margin-top: 15px;
        }
        .page-info { color: var(--text-secondary); font-size: 0.9em; }
        
        .result-bar {
            background: var(--bg-card); border-radius: 12px;
            padding: 15px 20px; margin-top: 15px; text-align: center;
        }
        .result-bar .score { font-size: 1.5em; color: #ffd700; font-weight: bold; }
        select {
            background: rgba(30, 30, 58, 0.95) !important;
            color: #0d0d0d !important;
        }
        select option {
            background: var(--bg-secondary);
            color: #0d0d0d;
        }
    </style>
</head>
<body class="exam-vocab-page">
    <div class="header">
        <h1>📖 单词背诵系统</h1>
        <a href="/" class="back-btn">← 返回主菜单</a>
    </div>

    <div class="container">
        <!-- 控制面板 -->
        <div class="control-panel">
            <div class="select-row">
                <div class="select-group">
                    <label>📅 今日词组</label>
                    <select id="todayGroup" onchange="loadWords()">
                        <option value="">-- 请选择 --</option>
                        {% for g in groups %}
                        <option value="{{ g }}">{{ g }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="select-group">
                    <label>📅 昨日词组（复习）</label>
                    <select id="yesterdayGroup" onchange="loadWords()">
                        <option value="">-- 可不选 --</option>
                        {% for g in groups %}
                        <option value="{{ g }}">{{ g }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="btn-row">
                <button class="btn btn-start" id="btnStart" onclick="startRecitation()">▶ 开始背诵</button>
                <button class="btn btn-exit" id="btnExit" onclick="exitRecitation()" style="display:none;">✕ 退出背诵</button>
                <button class="btn btn-finish" id="btnFinish" onclick="finishRecitation()" style="display:none;">✓ 完成背诵</button>
                <button class="btn btn-shuffle" onclick="shuffleWords()">🔀 随机排序</button>
            </div>
        </div>

        <!-- 信息栏 -->
        <div class="info-bar">
            <span id="infoText">请选择词组开始学习</span>
            <span id="statusText"></span>
        </div>

        <!-- 单词表格 -->
        <div class="table-container">
            <table>
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <!-- 分页 -->
        <div class="page-control">
            <button class="btn btn-page" onclick="prevPage()">◀ 上一页</button>
            <span class="page-info" id="pageInfo">第 1 页</span>
            <button class="btn btn-page" onclick="nextPage()">下一页 ▶</button>
        </div>

        <!-- 结果栏 -->
        <div class="result-bar" id="resultBar" style="display:none;">
            <span class="score" id="scoreText"></span>
        </div>
    </div>

    <script>
        let allWords = [];
        let userAnswers = {};
        let currentPage = 0;
        const wordsPerPage = 10;
        let isRecitationMode = false;
        let showAnswersMode = false;
        let checkResults = {};

        // ========== 加载单词 ==========
        async function loadWords() {
            const today = document.getElementById('todayGroup').value;
            const yesterday = document.getElementById('yesterdayGroup').value;
            
            if (!today && !yesterday) {
                allWords = [];
                renderTable();
                updateInfo();
                return;
            }
            
            const resp = await fetch(`/api/recitation/words?today=${encodeURIComponent(today)}&yesterday=${encodeURIComponent(yesterday)}`);
            const data = await resp.json();
            allWords = data.words;
            currentPage = 0;
            userAnswers = {};
            checkResults = {};
            renderTable();
            updateInfo();
        }

        function updateInfo() {
            const today = document.getElementById('todayGroup').value;
            const yesterday = document.getElementById('yesterdayGroup').value;
            const todayCount = allWords.filter(w => w.type === '今日').length;
            const yesterdayCount = allWords.filter(w => w.type === '昨日').length;
            
            let text = '';
            if (today) text += `今日: ${today} (${todayCount}个) `;
            if (yesterday) text += `| 昨日: ${yesterday} (${yesterdayCount}个) `;
            text += `| 总计: ${allWords.length}个`;
            document.getElementById('infoText').textContent = text;
        }

        // ========== 渲染表格 ==========
        function renderTable() {
            const start = currentPage * wordsPerPage;
            const end = start + wordsPerPage;
            const pageWords = allWords.slice(start, end);
            
            // 表头
            let headHtml = '<tr>';
            if (showAnswersMode) {
                headHtml += '<th style="color:#00cec9;">序号</th><th style="color:#ffd700;">单词</th><th style="color:#00cec9;">词性</th><th style="color:#ffd700;">正确答案</th><th style="color:#ffd700;">你的答案</th><th style="color:#fdcb6e;">状态</th>';
            } else if (isRecitationMode) {
                headHtml += '<th style="color:#00cec9;">序号</th><th style="color:#ffd700;">单词</th><th style="color:#00cec9;">词性</th><th style="color:#ffd700;">你的答案</th><th style="color:#74b9ff;">来源</th>';
            } else {
                headHtml += '<th style="color:#00cec9;">序号</th><th style="color:#ffd700;">单词</th><th style="color:#00cec9;">词性</th><th style="color:#ffd700;">中文释义</th><th style="color:#fdcb6e;">来源</th>';
            }
            headHtml += '</tr>';
            document.getElementById('tableHead').innerHTML = headHtml;
            
            // 表体
            let bodyHtml = '';
            for (let i = 0; i < wordsPerPage; i++) {
                const globalIndex = start + i;
                const w = pageWords[i];
                
                bodyHtml += '<tr>';
                bodyHtml += `<td>${w ? globalIndex + 1 : ''}</td>`;
                bodyHtml += `<td style="font-weight:bold;">${w ? w.word : ''}</td>`;
                bodyHtml += `<td>${w ? w.part_of_speech : ''}</td>`;
                
                if (showAnswersMode && w) {
                    const ua = userAnswers[globalIndex] || '';
                    const cr = checkResults[globalIndex];
                    // 第4列：正确答案
                    bodyHtml += `<td>${w.chinese_meaning}</td>`;
                    // 第5列：你的答案
                    bodyHtml += `<td class="${cr ? (cr.is_correct ? 'correct-text' : 'wrong-text') : ''}">${ua}</td>`;
                    // 第6列：状态
                    bodyHtml += `<td class="${cr ? (cr.is_correct ? 'status-correct' : 'status-wrong') : ''}">${cr ? (cr.is_correct ? '✓正确' : '✗错误') : ''}</td>`;
                
                } else if (isRecitationMode && w) {
                    // 背诵模式
                    bodyHtml += `<td><input type="text" id="ans_${globalIndex}" value="${userAnswers[globalIndex] || ''}" 
                        oninput="saveAnswer(${globalIndex})" onkeydown="handleKey(event, ${globalIndex})" 
                        placeholder="输入中文释义..."></td>`;
                    bodyHtml += `<td>${w.type}</td>`;
                } else if (w) {
                    // 正常模式
                    bodyHtml += `<td>${w.chinese_meaning}</td>`;
                    bodyHtml += `<td>${w.type}</td>`;
                } else {
                    bodyHtml += '<td></td><td></td>';
                }
                bodyHtml += '</tr>';
            }
            document.getElementById('tableBody').innerHTML = bodyHtml;
            
            // 分页信息
            const totalPages = Math.max(1, Math.ceil(allWords.length / wordsPerPage));
            document.getElementById('pageInfo').textContent = `第 ${currentPage + 1} 页 / 共 ${totalPages} 页`;
            
            // 聚焦第一个输入框
            if (isRecitationMode && !showAnswersMode) {
                setTimeout(() => {
                    const firstInput = document.getElementById(`ans_${start}`);
                    if (firstInput) firstInput.focus();
                }, 100);
            }
        }

        // ========== 答案管理 ==========
        function saveAnswer(index) {
            const input = document.getElementById(`ans_${index}`);
            if (input) userAnswers[index] = input.value;
        }

        function handleKey(event, index) {
            if (event.key === 'Enter' || event.key === 'Tab') {
                event.preventDefault();
                const nextIndex = index + 1;
                const endIndex = (currentPage + 1) * wordsPerPage;
                
                if (nextIndex < allWords.length && nextIndex < endIndex) {
                    document.getElementById(`ans_${nextIndex}`)?.focus();
                } else if (nextIndex < allWords.length) {
                    currentPage++;
                    renderTable();
                }
            } else if (event.key === 'ArrowUp') {
                event.preventDefault();
                const prevIndex = index - 1;
                if (prevIndex >= currentPage * wordsPerPage) {
                    document.getElementById(`ans_${prevIndex}`)?.focus();
                } else if (currentPage > 0) {
                    currentPage--;
                    renderTable();
                    setTimeout(() => {
                        const lastIndex = (currentPage + 1) * wordsPerPage - 1;
                        document.getElementById(`ans_${Math.min(lastIndex, allWords.length - 1)}`)?.focus();
                    }, 100);
                }
            } else if (event.key === 'ArrowDown') {
                event.preventDefault();
                const nextIndex = index + 1;
                const endIndex = (currentPage + 1) * wordsPerPage;
                if (nextIndex < allWords.length && nextIndex < endIndex) {
                    document.getElementById(`ans_${nextIndex}`)?.focus();
                } else if (nextIndex < allWords.length) {
                    currentPage++;
                    renderTable();
                }
            }
        }

        // ========== 按钮操作 ==========
        async function startRecitation() {
            if (!allWords.length) return alert('请先选择词组');
            
            // 收集当前输入
            collectAnswers();
            
            isRecitationMode = true;
            showAnswersMode = false;
            userAnswers = {};
            checkResults = {};
            
            // 随机排序
            allWords = [...allWords].sort(() => Math.random() - 0.5);
            currentPage = 0;
            
            document.getElementById('btnStart').style.display = 'none';
            document.getElementById('btnExit').style.display = 'inline-block';
            document.getElementById('btnFinish').style.display = 'inline-block';
            document.getElementById('resultBar').style.display = 'none';
            
            renderTable();
        }

        function exitRecitation() {
            collectAnswers();
            isRecitationMode = false;
            showAnswersMode = false;
            
            document.getElementById('btnStart').style.display = 'inline-block';
            document.getElementById('btnExit').style.display = 'none';
            document.getElementById('btnFinish').style.display = 'none';
            document.getElementById('resultBar').style.display = 'none';
            
            renderTable();
            document.getElementById('statusText').textContent = '已退出背诵模式';
        }

        async function finishRecitation() {
            collectAnswers();
            
            // 提交答案检查
            const answers = allWords.map((w, i) => ({
                word: w.word,
                user_answer: userAnswers[i] || '',
                correct_answer: w.chinese_meaning
            }));
            
            const resp = await fetch('/api/recitation/check', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({answers})
            });
            const data = await resp.json();
            
            // 存储结果
            data.results.forEach((r, i) => {
                checkResults[i] = r;
            });
            
            showAnswersMode = true;
            document.getElementById('resultBar').style.display = 'block';
            document.getElementById('scoreText').textContent = 
                `正确: ${data.correct_count}/${data.total} (${data.accuracy}%)`;
            document.getElementById('statusText').textContent = 
                `背诵完成！正确率: ${data.accuracy}%`;
            
            renderTable();
        }

        function collectAnswers() {
            if (!isRecitationMode || showAnswersMode) return;
            const start = currentPage * wordsPerPage;
            for (let i = start; i < start + wordsPerPage && i < allWords.length; i++) {
                const input = document.getElementById(`ans_${i}`);
                if (input) userAnswers[i] = input.value;
            }
        }

        function shuffleWords() {
            collectAnswers();
            allWords = [...allWords].sort(() => Math.random() - 0.5);
            currentPage = 0;
            renderTable();
            document.getElementById('statusText').textContent = '单词已随机排序';
        }

        function prevPage() {
            if (currentPage > 0) {
                collectAnswers();
                currentPage--;
                renderTable();
            }
        }

        function nextPage() {
            const totalPages = Math.ceil(allWords.length / wordsPerPage);
            if (currentPage < totalPages - 1) {
                collectAnswers();
                currentPage++;
                renderTable();
            }
        }

        // 初始化：默认选第一个词组
        window.onload = function() {
            const todaySelect = document.getElementById('todayGroup');
            if (todaySelect.options.length > 1) {
                todaySelect.selectedIndex = 1;
                loadWords();
            }
        };
    </script>
</body>
</html>
