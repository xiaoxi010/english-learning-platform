<!-- templates/shadow_hunter.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阴影迷踪 - 考试</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/exam-vocab.css') }}">
<style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-user-select:none; }
        body { font-family:"Microsoft YaHei",sans-serif;  min-height:100vh; color:var(--text-primary); padding-bottom:40px; }
        .header { background:var(--bg-primary); padding:10px 25px; display:flex; justify-content:space-between; align-items:center; }
        .header h1 { font-size:1.3em; color:#ffd700; }
        .back-btn { color:var(--text-secondary); text-decoration:none; padding:6px 14px; border-radius:20px; background:var(--bg-secondary); font-size:0.9em; }
        .main-wrap { max-width:1400px; margin:0 auto; padding:12px; }
        .panel { background:var(--bg-card); border:1px solid var(--border-color); border-radius:8px; padding:20px; margin-bottom:15px; }
        .panel h2 { color:#ffd700; margin-bottom:18px; font-size:1.5em; text-align:center; }
        .select-row { display:flex; gap:20px; margin-bottom:18px; justify-content:center; flex-wrap:wrap; }
        .select-group { min-width:300px; text-align:left; position:relative; }
        .select-group label { display:block; color:#ffd700; margin-bottom:5px; font-weight:bold; font-size:0.9em; }
        .select-group input { width:100%; padding:10px; border-radius:8px; background:var(--bg-secondary); color:var(--text-primary); border:1px solid var(--border-color); font-size:0.95em; }
        .select-group input:focus { outline:none; border-color:#ffd700; }
        .dropdown { position:absolute; top:100%; left:0; right:0; max-height:200px; overflow-y:auto; background:var(--bg-secondary); border:1px solid var(--border-color); border-radius:0 0 8px 8px; z-index:10; display:none; }
        .dropdown div { padding:8px 10px; cursor:pointer; font-size:0.9em; }
        .dropdown div:hover { background:rgba(255,215,0,0.15); }
        .btn { padding:10px 24px; border:none; border-radius:8px; cursor:pointer; font-size:0.95em; font-weight:bold; transition:all 0.2s; color:var(--text-primary); }
        .btn-orange { background:#ffd700; }
        .btn-green { background:#ffd700; }
        .btn-purple { background:#ffd700; }
        .btn-gold { background:#ffd700; color:#000; }
        .btn:disabled { opacity:0.4; cursor:not-allowed; }
        .timer { font-size:2.5em; color:#ffd700; font-weight:bold; margin-bottom:12px; text-align:center; }
        .timer.warning { color:#e74c3c; animation:blink 1s infinite; }
        @keyframes blink { 50%{opacity:0.5;} }
        .instruction { color:var(--text-secondary); text-align:center; margin-bottom:15px; font-size:0.95em; }
        .word-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:8px; margin-bottom:18px; }
        .word-card { background:var(--bg-secondary); border-radius:8px; padding:10px 8px; text-align:center; border:2px solid #333; }
        .word-card .w-num { font-size:0.7em; color:#888; }
        .word-card .w-word { font-size:0.95em; font-weight:bold; color:#ffd700; margin:3px 0; }
        .word-card .w-pos { font-size:0.7em; color:#ffd700; margin-bottom:6px; }
        .word-card input { width:100%; padding:6px; border-radius:4px; border:1px solid var(--border-color); background:rgba(0,0,0,0.3); color:var(--text-primary); font-size:0.85em; text-align:center; }
        .word-card input:focus { outline:none; border-color:#ffd700; }
        .result-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:8px; margin-bottom:18px; }
        .result-cell { background:var(--bg-secondary); border-radius:8px; padding:10px 8px; text-align:center; border:3px solid transparent; }
        .result-cell.border-green { border-color:#ffd700; background:#1a2a1a; }
        .result-cell.border-gold { border-color:#ffd700; background:#2a2a00; }
        .result-cell.border-orange { border-color:#ffa500; background:#2a1a00; }
        .result-cell.border-red { border-color:#e74c3c; background:#2a1a1a; }
        .result-cell .r-num { font-size:0.7em; color:#888; }
        .result-cell .r-word { font-size:0.9em; font-weight:bold; color:#ffd700; margin:3px 0; }
        .result-cell .r-pos { font-size:0.7em; color:#ffd700; margin-bottom:4px; }
        .result-cell .r-user { font-size:0.8em; margin-bottom:2px; }
        .result-cell .r-answer { font-size:0.8em; color:#ffd700; margin-bottom:2px; }
        .result-cell .r-score { font-size:0.85em; font-weight:bold; }
        .score-bar { text-align:center; font-size:1.2em; margin:10px 0; }
        .hidden { display:none !important; }
        .btn-row { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:12px; }
        .pattern-row { display:flex; gap:20px; justify-content:center; flex-wrap:wrap; margin:20px 0; }
        .pattern-card { background:var(--bg-secondary); border-radius:16px; padding:30px 20px; text-align:center; border:3px solid #444; transition:all 0.15s; width:200px; min-height:130px; display:flex; flex-direction:column; justify-content:center; align-items:center; }
        .pattern-card.flashing { animation:patternFlash 0.12s ease-in-out; }
        @keyframes patternFlash { 0%{border-color:#ffd700;box-shadow:0 0 20px rgba(255,0,0,0.8);} 100%{border-color:#ffd700;box-shadow:0 0 35px rgba(255,0,0,0.5);} }
        .pattern-card.won { border-color:#ffd700 !important; box-shadow:0 0 40px rgba(46,204,113,0.8) !important; background:#1a2a1a !important; }
        .pattern-card .pc-name { color:#ffd700; font-weight:bold; font-size:1.3em; margin-bottom:10px; }
        .pattern-card .pc-score { color:var(--text-secondary); font-size:0.9em; }
        .countdown-text { text-align:center; font-size:1.3em; color:#ffd700; margin-top:15px; }
        
        /* 七十二变 */
        .four-col { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
        .col-panel { background:var(--bg-secondary); border-radius:8px; padding:10px; }
        .col-panel h3 { color:#ffd700; text-align:center; font-size:0.95em; margin-bottom:8px; }
        .match-card { background:var(--bg-secondary); border-radius:6px; padding:8px; margin:3px 0; cursor:pointer; text-align:center; border:2px solid transparent; transition:all 0.2s; font-size:0.85em; }
        .match-card:hover { background:#3a3a4a; }
        .match-card.selected { border-color:#ffd700 !important; background:#3a3020; }
        .match-card.matched { opacity:0.5; background:#2a2a2a; cursor:default; border-color:#555; }
        .match-card .matched-meaning { color:#ffd700; font-size:0.75em; margin-top:4px; }
        
        /* 盗宝大师完整样式 */
        .skill-grid { display:flex; gap:15px; justify-content:center; flex-wrap:wrap; margin:20px 0; }
        .skill-card { background:var(--bg-secondary); border-radius:16px; padding:30px 20px; text-align:center; border:2px solid #444; cursor:pointer; transition:all 0.3s; width:220px; min-height:160px; }
        .skill-card:hover { border-color:#ffd700; transform:translateY(-5px); box-shadow:0 10px 30px rgba(255,215,0,0.15); }
        .skill-card.selected { border-color:#ffd700; background:rgba(255,215,0,0.15); box-shadow:0 0 30px rgba(255,215,0,0.15); }
        .skill-card .sk-name { color:#ffd700; font-weight:bold; font-size:1.2em; margin-bottom:10px; }
        .skill-card .sk-desc { color:var(--text-secondary); font-size:0.85em; line-height:1.5; }
        .treasure-row { display:flex; gap:20px; justify-content:center; margin:25px 0; flex-wrap:wrap; }
        .treasure-card { background:var(--bg-secondary); border-radius:16px; padding:20px 15px; text-align:center; border:3px solid #ffd700; cursor:pointer; transition:all 0.3s; width:190px; min-height:260px; position:relative; overflow:hidden; display:flex; flex-direction:column; justify-content:center; align-items:center; }
        .treasure-card:hover:not(.empty-card):not(.selected-card):not(.disabled-card) { border-color:var(--theme); transform:translateY(-8px) scale(1.02); box-shadow:0 0 30px var(--theme),0 15px 40px var(--theme); }
        .treasure-card.empty-card { border-color:#333; opacity:0.5; cursor:not-allowed; }
        .treasure-card.empty-card:hover { transform:none; box-shadow:none; }
        .treasure-card.selected-card { border-color:#ffd700; background:rgba(255,215,0,0.15); box-shadow:0 0 50px #ffd700; }
        .treasure-card.disabled-card { pointer-events:none; }
        .treasure-card.flashing { animation:flashCard 0.3s ease-in-out; }
        @keyframes flashCard { 0%{border-color:#ffd700;box-shadow:0 0 30px rgba(255,0,0,0.8);} 50%{border-color:#ffd700;box-shadow:0 0 50px rgba(255,0,0,0.5);} 100%{border-color:#ffd700;box-shadow:0 0 30px rgba(255,0,0,0.8);} }
        .treasure-card .tc-name { color:var(--theme); font-weight:bold; font-size:1.1em; position:absolute; top:12px; left:0; right:0; text-align:center;}
        .treasure-card .tc-meaning { color:#ddd; font-size:0.85em; line-height:1.4; padding:0 10px; word-break:break-all;display:flex; align-items:center; justify-content:center; min-height:60px; margin-top:20px;}
        .treasure-card .tc-empty { color:#555; font-size:0.85em; display:flex; align-items:center; justify-content:center; min-height:60px;}
        .particle { position:absolute; border-radius:50%; pointer-events:none; z-index:5; animation:riseUp var(--dur) ease-out forwards; }
        @keyframes riseUp { 0%{opacity:1;transform:translate(0,0) scale(1);} 30%{opacity:0.9;} 60%{opacity:0.5;} 100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0);} }
        .bg-particle { position:absolute; border-radius:50%; pointer-events:none; z-index:1; animation:fallDown var(--dur) linear forwards; }
        @keyframes fallDown { 0%{opacity:0.8;transform:translate(0,0);} 20%{opacity:0.7;} 60%{opacity:0.4;} 100%{opacity:0;transform:translate(0,var(--dy));} }
        .stat-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin:15px 0; }
        .stat-card { background:var(--bg-secondary); border-radius:12px; padding:15px; text-align:center; border:2px solid #444; cursor:pointer; transition:all 0.3s; }
        .stat-card:hover { border-color:#ffd700; }
        .stat-card.dig-selected { border-color:#ffd700; background:rgba(255,215,0,0.15); }
        .stat-card.flashing { animation:flashCard 0.3s ease-in-out; }
        .stat-card .st-name { color:#ffd700; font-weight:bold; font-size:1.1em; }
        .stat-card .st-info { color:var(--text-secondary); font-size:0.85em; margin-top:5px; }
        .btn-blue { background:#ffd700; }

        /* 三十六计完整样式 */
        .strategy-container { display:flex; flex-direction:column; gap:15px; }
        .tabs { display:flex; gap:5px; margin-bottom:10px; }
        .tab-btn { padding:8px 16px; border:none; border-radius:8px 8px 0 0; cursor:pointer; background:var(--bg-secondary); color:var(--text-secondary); font-size:0.9em; }
        .tab-btn.active { background:#ffd700; color:var(--text-primary); }
        .tab-content { display:none; }
        .tab-content.active { display:block; }
        .summary-table { width:100%; border-collapse:collapse; font-size:0.8em; margin-bottom:15px; }
        .summary-table th { background:var(--bg-card); padding:6px 4px; }
        .summary-table td { padding:5px 4px; text-align:center; border-bottom:1px solid var(--bg-secondary); }
        
        /* 总成绩报告 */
        .report-top { display:flex; gap:15px; margin-bottom:15px; }
        .report-info { flex:1; background:var(--bg-secondary); border:1px solid #fff; padding:10px; }
        .report-info .r-row { padding:3px 0; font-size:0.8em; }
        .report-info .r-label { color:#ffd700; font-weight:bold; }
        .report-photo { width:200px; background:var(--bg-secondary); border:1px solid #fff; display:flex; align-items:center; justify-content:center; font-size:1.3em; font-weight:bold; }
        .report-photo img { max-width:100%; max-height:110px; }
        .report-table-wrap { background:var(--bg-secondary); border:1px solid #fff; max-height:45vh; overflow-y:auto; }
        .report-table { width:100%; border-collapse:collapse; font-size:0.7em; }
        .report-table th { background:var(--bg-card); padding:4px 2px; position:sticky; top:0; }
        .report-table td { padding:3px 2px; text-align:center; border:1px solid rgba(255,255,255,0.3); }
        .td-green { color:#ffd700; font-weight:bold; }
        .td-red { color:#e74c3c; font-weight:bold; }
        .td-gold { color:#ffd700; font-weight:bold; }
    </style>
</head>
<body class="exam-vocab-page">
<div class="header"><h1>🌑 阴影迷踪</h1><a href="/" class="back-btn">← 返回主菜单</a></div>
<div class="main-wrap">

<!-- s1: 考试设置 -->
<div class="panel" id="s1">
    <h2>考试设置</h2>
    <div class="select-row">
        <div class="select-group"><label>📅 今日单词组（需≥20个）</label><input type="text" id="todayInput" placeholder="选择或搜索..." oninput="filterGroups('today')" onfocus="showDropdown('today')" autocomplete="off"><div class="dropdown" id="todayDropdown"></div></div>
        <div class="select-group"><label>📅 昨日单词组（需≥10个）</label><input type="text" id="yesterdayInput" placeholder="选择或搜索..." oninput="filterGroups('yesterday')" onfocus="showDropdown('yesterday')" autocomplete="off"><div class="dropdown" id="yesterdayDropdown"></div></div>
    </div>
    <div style="text-align:center"><button class="btn btn-orange" onclick="startExam()">开始考试</button></div>
</div>

<!-- s2: 基础词汇考试 -->
<div class="panel hidden" id="s2">
    <div class="timer" id="timer">300</div>
    <p class="instruction">请写出以下英文单词的中文意思：</p>
    <div class="word-grid" id="basicGrid"></div>
    <div style="text-align:center"><button class="btn btn-green" id="btnSubmitBasic" onclick="submitBasic()">提交答案</button></div>
</div>

<!-- s3: 批改结果 -->
<div class="panel hidden" id="s3">
    <h2>📝 批改结果 <span id="aiBadge" style="font-size:0.5em;vertical-align:middle;"></span></h2>
    <p class="instruction" style="font-size:0.8em;color:#888;">🟢 1.00分 | 🟡 0.75分 | 🟠 0.25-0.5分 | 🔴 0分</p>
    <div class="result-grid" id="resultGrid"></div>
    <div class="score-bar">基础词汇得分: <span id="basicScore" style="color:#ffd700;">0</span>/30</div>
    <div class="btn-row"><button class="btn btn-purple" onclick="goToDraw()">🎲 进入阴影迷踪 →</button></div>
</div>

<!-- s4: 版型抽取 -->
<div class="panel hidden" id="s4">
    <h2 style="color:#ffd700;text-align:center;">🎲 抽取版型</h2>
    <p class="instruction">点击"开始"按钮，卡片将快速闪烁，点击"停止"抽取版型</p>
    <div class="pattern-row" id="patternCards">
        <div class="pattern-card" id="pc_七十二变"><div class="pc-name">七十二变</div><div class="pc-score">通过: 47分</div></div>
        <div class="pattern-card" id="pc_三十六计"><div class="pc-name">三十六计</div><div class="pc-score">通过: 47分</div></div>
        <div class="pattern-card" id="pc_盗宝大师"><div class="pc-name">盗宝大师</div><div class="pc-score">通过: 46分</div></div>
        <div class="pattern-card" id="pc_诡影重重"><div class="pc-name">诡影重重</div><div class="pc-score">通过: 45分</div></div>
    </div>
    <div class="btn-row"><button class="btn btn-orange" id="btnDraw" onclick="toggleDraw()">🎲 开始</button></div>
    <div class="countdown-text hidden" id="drawCountdown"></div>
</div>

<!-- s5: 版型挑战（动态渲染） -->
<div class="panel hidden" id="s5"></div>

<!-- s6: 总成绩报告 -->
<div class="panel hidden" id="s6">
    <h2 style="color:#ffd700;text-align:center;margin-bottom:12px;">📊 阴影迷踪考试总成绩报告</h2>
    <div class="report-top"><div class="report-info" id="rinfo"></div><div class="report-photo" id="rphoto"></div></div>
    <div class="report-table-wrap"><table class="report-table"><thead><tr>
        <th style="background:#1a1a2a;color:#ffd700;">行号</th><th style="background:#ffd700;">单词</th><th style="background:#ffd700;">词性</th><th>汉译</th><th>得分</th>
        <th style="width:8px;"></th><th style="background:#ffd700;">单词</th><th style="background:#ffd700;">词性</th><th>汉译</th><th>得分</th>
        <th style="width:8px;"></th><th style="background:#ffd700;">单词</th><th style="background:#ffd700;">词性</th><th>汉译</th><th>得分</th>
    </tr></thead><tbody id="rbody"></tbody></table></div>
    <div class="btn-row"><button class="btn btn-green" onclick="exportPNG()">📄 导出PNG证书</button><button class="btn btn-purple" onclick="location.reload()">🔄 重新考试</button><button class="btn btn-gold" onclick="window.location.href='/'">🏠 返回主菜单</button></div>
</div>

</div>
<script>
var USER_NAME = "{{ user_name }}";
var STUDENT_ID = "{{ student_id }}";
var allGroups = [{% for g in groups %}"{{ g }}"{% if not loop.last %},{% endif %}{% endfor %}];
var examId='', basicWords=[], basicResults=[], basicScore=0, patternScore=0;
var selectedToday='', selectedYesterday='', selectedPattern='', patternPassScore=0;
var timerInterval=null, timeLeft=300;
var patternResults=[];

// ============ 下拉搜索 ============
function filterGroups(t){var v=document.getElementById(t+'Input').value.toLowerCase();document.getElementById(t+'Dropdown').innerHTML=allGroups.filter(function(g){return g.toLowerCase().indexOf(v)>=0;}).map(function(g){return '<div onclick="selectGroup(\''+t+'\',\''+g.replace(/'/g,"\\'")+'\')">'+g+'</div>';}).join('');document.getElementById(t+'Dropdown').style.display='block';}
function showDropdown(t){filterGroups(t);}
function selectGroup(t,n){document.getElementById(t+'Input').value=n;document.getElementById(t+'Dropdown').style.display='none';if(t==='today')selectedToday=n;else selectedYesterday=n;}
document.addEventListener('click',function(e){if(!e.target.closest('.select-group')){document.querySelectorAll('.dropdown').forEach(function(d){d.style.display='none';});}});

// ============ 通用函数 ============
function startTimer(el,cb,sec){timeLeft=sec||300;clearInterval(timerInterval);document.getElementById(el).textContent=timeLeft;document.getElementById(el).className='timer';timerInterval=setInterval(function(){timeLeft--;document.getElementById(el).textContent=timeLeft;if(timeLeft<=30)document.getElementById(el).className='timer warning';if(timeLeft<=0){clearInterval(timerInterval);cb();}},1000);}
function switchStage(id){['s1','s2','s3','s4','s5','s6'].forEach(function(s){document.getElementById(s).classList.toggle('hidden',s!==id);});}
function renderWordGrid(containerId,words,pre,isBasic){document.getElementById(containerId).innerHTML=words.map(function(w,i){return '<div class="word-card"><div class="w-num">'+(i+1)+'</div><div class="w-word">'+w.word+'</div><div class="w-pos">'+w.pos+'</div><input type="text" id="'+pre+i+'" placeholder="中文意思" onkeydown="hk(event,'+i+',\''+pre+'\','+(isBasic?'true':'false')+')"></div>';}).join('');}
function hk(e,i,pre,isB){var n=i;if(e.key==='Enter'||e.key==='Tab'){e.preventDefault();n=i+1;}else if(e.key==='ArrowUp'){e.preventDefault();n=i-6;}else if(e.key==='ArrowDown'){e.preventDefault();n=i+6;}else if(e.key==='ArrowLeft'&&e.target.selectionStart===0){e.preventDefault();n=i-1;if(n%6===5)return;}else if(e.key==='ArrowRight'&&e.target.selectionStart===e.target.value.length){e.preventDefault();n=i+1;if(n%6===0)return;}else return;var ws=isB?basicWords:(window.shadowWords||[]);if(n>=0&&n<ws.length)document.getElementById(pre+n)&&document.getElementById(pre+n).focus();}

// ============ 基础词汇考试 ============
async function startExam(){
    if(!selectedToday||!selectedYesterday)return alert('请选择今日和昨日单词组');
    var r=await fetch('/api/shadow_hunter/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({today_group:selectedToday,yesterday_group:selectedYesterday})});
    var d=await r.json();if(!d.success)return alert(d.message);
    examId=d.exam_id;basicWords=d.words;switchStage('s2');
    renderWordGrid('basicGrid',basicWords,'a',true);startTimer('timer',submitBasic,300);
    setTimeout(function(){document.getElementById('a0')&&document.getElementById('a0').focus();},100);
}

async function submitBasic(){
    clearInterval(timerInterval);
    var btn=document.getElementById('btnSubmitBasic');btn.textContent='正在批改中，请耐心等待···';btn.disabled=true;btn.style.opacity='0.6';btn.style.cursor='not-allowed';
    var ans={};basicWords.forEach(function(w,i){var e=document.getElementById('a'+i);ans[i]=e?e.value:'';});
    var r=await fetch('/api/shadow_hunter/submit_basic',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({exam_id:examId,answers:ans})});
    var d=await r.json();if(!d.success)return alert(d.message);
    basicResults=d.results;basicScore=d.score;switchStage('s3');
    var badgeEl=document.getElementById('aiBadge');
    if(d.used_ai){badgeEl.innerHTML='🤖 AI批改';badgeEl.style.color='#ffd700';}else{badgeEl.innerHTML='⚙️ 系统批改';badgeEl.style.color='#ffd700';}
    document.getElementById('resultGrid').innerHTML=basicResults.map(function(r,i){
        var bcClass=r.border_color==='#00ff00'?'border-green':(r.border_color==='#ffd700'?'border-gold':(r.border_color==='#ffa500'?'border-orange':'border-red'));
        var sc=r.score>=0.99?'#2ecc71':(r.score>=0.5?'#ffd700':(r.score>=0.25?'#ffa500':'#e74c3c'));

var drawInterval=null,isDrawing=false,drawStage='start',countdownId=null;
function goToDraw(){switchStage('s4');drawStage='start';selectedPattern='';document.querySelectorAll('.pattern-card').forEach(function(c){c.classList.remove('flashing','won');});document.getElementById('btnDraw').textContent='🎲 开始';document.getElementById('btnDraw').className='btn btn-orange';document.getElementById('btnDraw').disabled=false;document.getElementById('btnDraw').style.opacity='1';document.getElementById('drawCountdown').classList.add('hidden');}
async function toggleDraw() {
    if (drawStage === 'start') {
        // 开始抽取
        isDrawing = true;
        drawStage = 'drawing';
        document.getElementById('btnDraw').textContent = '✋ 停止';
        document.getElementById('btnDraw').className = 'btn btn-green';
        document.getElementById('drawCountdown').classList.add('hidden');
        
        document.querySelectorAll('.pattern-card').forEach(function(c) { c.classList.remove('won'); });
        
        drawInterval = setInterval(function() {
            var cards = document.querySelectorAll('.pattern-card');
            cards.forEach(function(c) { c.classList.remove('flashing'); });
            var count = Math.floor(Math.random() * 3) + 1;
            var shuffled = Array.from(cards).sort(function() { return Math.random() - 0.5; });
            for (var i = 0; i < count; i++) { shuffled[i].classList.add('flashing'); }
        }, 100);
        
    } else if (drawStage === 'drawing') {
        // 停止抽取 - 调用后端API决定版型
        clearInterval(drawInterval);
        isDrawing = false;
        drawStage = 'result';
        
        var cards = document.querySelectorAll('.pattern-card');
        cards.forEach(function(c) { c.classList.remove('flashing'); });
        
        document.getElementById('btnDraw').disabled = true;
        document.getElementById('btnDraw').style.opacity = '0.5';
        
        // 调用后端API获取版型
        var r = await fetch('/api/shadow_hunter/draw_pattern', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({exam_id: examId})
        });
        var d = await r.json();
        if (!d.success) { 
            alert(d.message); 
            drawStage = 'start';
            document.getElementById('btnDraw').disabled = false;
            document.getElementById('btnDraw').style.opacity = '1';
            document.getElementById('btnDraw').textContent = '🎲 开始';
            return;
        }
        
        selectedPattern = d.pattern;
        patternPassScore = d.pass_score;
        
        var wonCard = document.getElementById('pc_' + selectedPattern);
        if (wonCard) { wonCard.classList.add('won'); }
        
        document.getElementById('btnDraw').textContent = '🎯 ' + selectedPattern + ' (通过:' + patternPassScore + '分)';
        
        // 5秒倒计时
        var count = 5;
        var countdownEl = document.getElementById('drawCountdown');
        countdownEl.classList.remove('hidden');
        countdownEl.textContent = count + '秒后自动进入版型考试...';
        
        clearInterval(countdownId);
        countdownId = setInterval(function() {
            count--;
            if (count <= 0) {
                clearInterval(countdownId);
                enterPatternExam();
            } else {
                countdownEl.textContent = count + '秒后自动进入版型考试...';
            }
        }, 1000);
    }
}

    document.getElementById('roundIndicator').textContent='第 '+d.round+'/20 轮';
    document.getElementById('roundWord').textContent=d.word;
    document.getElementById('treasureCards').innerHTML=buildTreasureCardsHTML(d.meanings,d.empty_card);
    renderExamSkills();isSelecting=false;
    startTimer('roundTimer',function(){submitChoice(0,false);},16);
}
function renderExamSkills(){
    var sb='';
    if(treasureSkills.indexOf('重置')>=0){
        var left=skillRemaining['重置']||0;
        var cls='skill-btn';
        if(left<=0)cls+=' used-up';
        sb+='<button class="'+cls+'" onclick="useReset()">重置 ('+left+'/3)</button>';
    }
    document.getElementById('examSkillBar').innerHTML=sb;
}
function addBgParticles(cardId,cardNum){
    var el=document.getElementById(cardId);if(!el||el.classList.contains('empty-card'))return;
    if(bgParticleIntervals[cardId])return;
    spawnBgBatch(cardId,8,cardNum);
    bgParticleIntervals[cardId]=setInterval(function(){if(!document.getElementById(cardId)||document.getElementById(cardId).classList.contains('disabled-card')){clearBgParticles(cardId);return;}spawnBgBatch(cardId,3,cardNum);},300);
}
function spawnBgBatch(cardId,count,cardNum){
    var el=document.getElementById(cardId);if(!el)return;
    var hueRange=treasureHues[cardNum-1];
    for(var i=0;i<count;i++){
        var p=document.createElement('div');p.className='bg-particle';p.style.left=(Math.random()*90+5)+'%';p.style.top=(Math.random()*15)+'%';
        var size=Math.random()*3+1.5;p.style.width=size+'px';p.style.height=size+'px';
        var hue=hueRange[0]+Math.random()*(hueRange[1]-hueRange[0]);var sat=Math.random()*30+60;var light=Math.random()*20+60;
        p.style.background='hsla('+hue+','+sat+'%,'+light+'%,0.8)';p.style.boxShadow='0 0 '+Math.random()*3+1+'px hsla('+hue+','+sat+'%,'+light+'%,0.5)';
        var dy=Math.random()*150+100;p.style.setProperty('--dy',dy+'px');var dur=randomBgDuration();p.style.setProperty('--dur',dur+'s');
        el.appendChild(p);setTimeout(function(){if(p.parentNode)p.remove();},dur*1000+50);
    }
}
function randomBgDuration(){var r=Math.random();if(r<0.5)return 1+Math.random()*1;if(r<0.8)return 2+Math.random()*1;if(r<0.95)return 3+Math.random()*1.5;return 4.5+Math.random()*2;}
function clearBgParticles(cardId){
    if(cardId){if(bgParticleIntervals[cardId]){clearInterval(bgParticleIntervals[cardId]);delete bgParticleIntervals[cardId];}var el=document.getElementById(cardId);if(el){el.querySelectorAll('.bg-particle').forEach(function(p){p.remove();});}}
    else{Object.keys(bgParticleIntervals).forEach(function(k){clearInterval(bgParticleIntervals[k]);});bgParticleIntervals={};document.querySelectorAll('.bg-particle').forEach(function(p){p.remove();});}
}
function disableAllTreasureCards(){for(var i=1;i<=5;i++){var card=document.getElementById('tcard_'+i);if(card)card.classList.add('disabled-card');}}
function selectTreasure(choice){
    if(isSelecting)return;
    isSelecting=true;
    clearInterval(timerInterval);clearBgParticles();
    disableAllTreasureCards();
    var card=document.getElementById('tcard_'+choice);
    if(card){card.classList.add('selected-card');spawnParticles(card);}
    setTimeout(function(){submitChoice(choice);},1000);
}
function spawnParticles(el){
    var particleCount=150;
    for(var i=0;i<particleCount;i++){
        var p=document.createElement('div');p.className='particle';
        p.style.left=(Math.random()*100)+'%';p.style.top='90%';
        var size=Math.random()*5+2;p.style.width=size+'px';p.style.height=size+'px';
        var hue=Math.random()*40+20;var sat=Math.random()*30+70;var light=Math.random()*30+50;
        p.style.background='hsl('+hue+','+sat+'%,'+light+'%)';p.style.boxShadow='0 0 '+Math.random()*4+2+'px hsl('+hue+','+sat+'%,'+light+'%)';
        var dx=(Math.random()-0.5)*120;var dy=-(Math.random()*200+80);
        p.style.setProperty('--dx',dx+'px');p.style.setProperty('--dy',dy+'px');
        var dur=randomDuration();p.style.setProperty('--dur',dur+'s');
        el.appendChild(p);setTimeout(function(){if(p.parentNode)p.remove();},dur*1000+50);
    }
}
function randomDuration(){var r=Math.random();if(r<0.5)return 0.6+Math.random()*0.4;if(r<0.8)return 1+Math.random()*0.5;if(r<0.95)return 1.5+Math.random()*0.5;return 2+Math.random()*1;}
async function submitChoice(choice){
    var r=await fetch('/api/shadow_hunter/treasure_choice',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({exam_id:examId,choice:choice,use_maple:false,use_reset:false})});
    var d=await r.json();if(!d.success)return;
    treasureScore=d.current_score;skillRemaining=d.skill_remaining;
    if(d.next_round){currentRound=d.next_round;loadRound();}else{finishGame();}
}
async function finishGame(){
    clearInterval(timerInterval);clearBgParticles();
    var r=await fetch('/api/shadow_hunter/treasure_final',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({exam_id:examId})});
    var d=await r.json();if(!d.success)return;
    finalReportData=d;
    if(!finalReportData.skill_results)finalReportData.skill_results={};
    roundOriginalColors={};
    showStatStage();
}
function showStatStage(){
    switchStage('s6_tr');
    var d=finalReportData;
    var rg='';
    for(var i=0;i<d.rounds_detail.length;i++){
        var rd=d.rounds_detail[i];
        rg+='<div class="round-word-card" id="rwc_'+i+'" onclick="statClickRound('+i+')"><div>'+(i+1)+'. '+rd.word+'</div><div style="color:#ffd700;">选:'+(rd.user_choice?treasureNames[rd.user_choice-1]:'空')+'</div></div>';
        roundOriginalColors[i]='#ffd700';
    }
    document.getElementById('roundWordsGrid').innerHTML=rg;
    var ts='';
    for(var i=1;i<=5;i++){
        ts+='<div class="stat-card" onclick="selectDigTreasure('+i+')" id="statCard_'+i+'"><div class="st-name">'+treasureNames[i-1]+'</div><div class="st-info">被选中: '+d.treasure_selects[i]+'次</div></div>';
    }
    document.getElementById('treasureStats').innerHTML=ts;
    activeSkill=null;techSelectedRounds=[];renderStatSkills();
    document.getElementById('btnDig').disabled=false;digSelected=null;
    startTimer('statTimer',autoSubmitDig,150);
}
function autoSubmitDig(){if(digSelected)digTreasure();}
function renderStatSkills(){
    var ssb='';
    for(var j=0;j<treasureSkills.length;j++){
        var s=treasureSkills[j];if(s==='重置')continue;
        var left=skillRemaining[s]||0;var cls='skill-btn';
        if(activeSkill===s)cls+=' ready';if(left<=0)cls+=' used-up';
        if(s==='科技之星'){
            var dotClass='skill-dot';
            if(finalReportData&&finalReportData.skill_results&&finalReportData.skill_results['科技之星']){var sr=finalReportData.skill_results['科技之星'];dotClass+=' '+(sr.status==='green'?'green':(sr.status==='yellow'?'yellow':'red'));ssb+='<button class="'+cls+'">'+sr.rounds.join('-')+' <span class="'+dotClass+'"></span></button>';}
            else{ssb+='<button class="'+cls+'" onclick="statActivateSkill(\''+s+'\')">科技之星 ('+left+') <span class="'+dotClass+'"></span></button>';}
        }else if(s==='翻牌'&&left<=0&&finalReportData&&finalReportData.skill_results&&finalReportData.skill_results['翻牌']){var fr=finalReportData.skill_results['翻牌'];ssb+='<button class="'+cls+'">'+treasureNames[fr.treasure-1]+'正确次数：'+fr.count+'次</button>';}
        else if(s==='预言'&&left<=0&&finalReportData&&finalReportData.skill_results&&finalReportData.skill_results['预言']){var pr=finalReportData.skill_results['预言'];ssb+='<button class="'+cls+'">真宝藏正确次数：'+pr.count+'次</button>';}
        else if(s==='枫恬果实'&&left<=0&&finalReportData&&finalReportData.skill_results&&finalReportData.skill_results['枫恬果实']){var mr=finalReportData.skill_results['枫恬果实'];if(mr.is_correct)ssb+='<button class="'+cls+'">版型+1分</button>';else ssb+='<button class="'+cls+'">第'+mr.round+'轮正确答案是'+treasureNames[mr.correct_card-1]+'</button>';}
        else{ssb+='<button class="'+cls+'" onclick="statActivateSkill(\''+s+'\')">'+s+' ('+left+')</button>';}
    }
    document.getElementById('statSkillBar').innerHTML=ssb;
}
function statClickRound(i){
    if(activeSkill==='看破'){useStatSkill('看破',{round_idx:i});}
    else if(activeSkill==='科技之星'){toggleTechRound(i);}
    else if(activeSkill==='枫恬果实'){useStatSkill('枫恬果实',{round_idx:i});}
}
function toggleTechRound(i){
    var el=document.getElementById('rwc_'+i);if(!el)return;
    var idx=techSelectedRounds.indexOf(i);
    if(idx>=0){techSelectedRounds.splice(idx,1);el.classList.remove('tech-selected');el.style.borderColor=roundOriginalColors[i]||'#ffd700';}
    else{if(techSelectedRounds.length>=4)return;roundOriginalColors[i]=el.style.borderColor||'#ffd700';techSelectedRounds.push(i);el.classList.add('tech-selected');el.style.borderColor='#ffff00';if(techSelectedRounds.length===4){useStatSkill('科技之星',{rounds:[...techSelectedRounds]});}}
}
function selectDigTreasure(t){
    if(activeSkill==='翻牌'){useStatSkill('翻牌',{target:t});return;}
    digSelected=t;document.querySelectorAll('.stat-card').forEach(function(el){el.classList.remove('dig-selected');});document.getElementById('statCard_'+t).classList.add('dig-selected');
}
function statActivateSkill(skill){
    if(skillRemaining[skill]<=0)return;
    if(activeSkill===skill){activeSkill=null;clearTechSelection();renderStatSkills();return;}
    if(activeSkill)clearTechSelection();
    activeSkill=skill;techSelectedRounds=[];
    if(skill==='预言'){useStatSkill('预言',{});return;}
    renderStatSkills();
}
function clearTechSelection(){
    document.querySelectorAll('.round-word-card.tech-selected').forEach(function(el){el.classList.remove('tech-selected');var i=parseInt(el.id.replace('rwc_',''));el.style.borderColor=roundOriginalColors[i]||'#ffd700';});
    techSelectedRounds=[];
}
async function useStatSkill(skill,params){
    var r=await fetch('/api/shadow_hunter/treasure_skill',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({exam_id:examId,skill:skill,target:params.target,round_idx:params.round_idx,rounds:params.rounds})});
    var d=await r.json();if(!d.success){activeSkill=null;renderStatSkills();return;}
    skillRemaining=d.skill_remaining;
    if(!finalReportData.skill_results)finalReportData.skill_results={};
    if(skill==='翻牌'){finalReportData.skill_results['翻牌']={treasure:d.result.treasure,count:d.result.count};}
    else if(skill==='预言'){finalReportData.skill_results['预言']={count:d.result.count};}
    else if(skill==='看破'){finalReportData.skill_results['看破']=finalReportData.skill_results['看破']||[];finalReportData.skill_results['看破'].push({round:params.round_idx+1,is_correct:d.result.is_correct});var el=document.getElementById('rwc_'+params.round_idx);if(el){el.classList.add(d.result.is_correct?'insight-green':'insight-red');roundOriginalColors[params.round_idx]=d.result.is_correct?'#2ecc71':'#e74c3c';}}
    else if(skill==='科技之星'){finalReportData.skill_results['科技之星']={rounds:params.rounds.map(function(x){return x+1;}),status:d.result.status,correct:d.result.correct};params.rounds.forEach(function(i){var el=document.getElementById('rwc_'+i);if(el){el.classList.remove('tech-selected');var origColor=roundOriginalColors[i];if(origColor&&origColor!=='#ffd700'){el.style.borderColor=origColor;}}});}
    else if(skill==='枫恬果实'){finalReportData.skill_results['枫恬果实']={is_correct:d.result.is_correct,correct_card:d.result.correct_card,round:params.round_idx+1};var el2=document.getElementById('rwc_'+params.round_idx);if(el2){if(d.result.is_correct){el2.classList.add('maple-green');roundOriginalColors[params.round_idx]='#ffd700';}else{el2.classList.add('maple-red');roundOriginalColors[params.round_idx]='#e74c3c';}}}
    activeSkill=null;techSelectedRounds=[];renderStatSkills();
}
async function digTreasure(){
    if(!digSelected)return;clearInterval(timerInterval);
    var r=await fetch('/api/shadow_hunter/treasure_dig',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({exam_id:examId,treasure:digSelected})});
    var d=await r.json();if(!d.success)return;
    if(d.gambled){skillRemaining['孤注一掷']=0;var flashDuration=5000+Math.floor(Math.random()*5000);await animateGambleFlash(flashDuration,d.selected,d.is_correct);}
    finalReportData.is_passed=d.is_passed;finalReportData.total_score=d.total_score;finalReportData.found_true_treasure=d.is_correct;finalReportData.treasure_score=d.treasure_score;finalReportData.final_selected=d.selected;finalReportData.true_treasure=d.true_treasure;
    patternScore=d.treasure_score;
    showFinalSummary();
}
function animateGambleFlash(duration,finalTreasure,isCorrect){
    return new Promise(function(resolve){
        var cards=document.querySelectorAll('.stat-card');var startTime=Date.now();var flashInterval=150;
        function flash(){var elapsed=Date.now()-startTime;
            if(elapsed>=duration){cards.forEach(function(c){c.classList.remove('flashing');});var finalCard=document.getElementById('statCard_'+finalTreasure);if(finalCard){cards.forEach(function(c){c.classList.remove('dig-selected');});setTimeout(function(){if(isCorrect){finalCard.style.borderColor='#ffd700';finalCard.style.boxShadow='0 0 20px rgba(46,204,113,0.8)';}else{if(finalCard.style.borderColor!=='#e74c3c'){finalCard.style.borderColor='#e74c3c';finalCard.style.boxShadow='0 0 20px rgba(231,76,60,0.8)';}}setTimeout(function(){resolve();},1000);},250);}else{setTimeout(function(){resolve();},1250);}return;}
            cards.forEach(function(c){c.classList.remove('flashing');});var randomCount=Math.floor(Math.random()*3)+1;var shuffled=Array.from(cards).sort(function(){return Math.random()-0.5;});for(var i=0;i<randomCount;i++){shuffled[i].classList.add('flashing');}setTimeout(flash,flashInterval);}
        flash();
    });
}
function showFinalSummary(){
    switchStage('s7_tr');var d=finalReportData;
    document.getElementById('finalResult').innerHTML=d.found_true_treasure?'<span style="color:#2ecc71;">🎉 恭喜！你找到了真宝藏！</span>':'<span style="color:#e74c3c;">😔 很遗憾，没有找到真宝藏</span>';
    document.getElementById('finalTS').textContent=d.treasure_score;document.getElementById('finalTotal').textContent=d.total_score.toFixed(2);
    var sk='';for(var j=0;j<treasureSkills.length;j++){var s=treasureSkills[j];var left=skillRemaining[s]||0;sk+='<span class="skill-badge '+(left<=0?'red':'green')+'">'+s+'</span> ';}
    document.getElementById('finalSkills').innerHTML=sk;
    document.getElementById('finalTT').textContent=treasureNames[d.true_treasure-1]+' ('+(d.treasure_counts[d.true_treasure]||0)+'/20)';
    var fg='';for(var i=0;i<d.rounds_detail.length;i++){var rd=d.rounds_detail[i];var cls=rd.is_correct?'style="border-color:#ffd700;"':'style="border-color:#e74c3c;"';fg+='<div class="round-word-card" '+cls+'><div>'+(i+1)+'. '+rd.word+'</div><div style="color:#ffd700;">✓'+treasureNames[rd.correct_card-1]+'</div><div style="color:#ffd700;">选:'+(rd.user_choice?treasureNames[rd.user_choice-1]:'空')+'</div></div>';}
    document.getElementById('finalRoundGrid').innerHTML=fg;
}

// ============ 总成绩报告 ============
function showFinalReport(){
    switchStage('s6');
    var totalScore = basicScore + patternScore;
    var isPassed = totalScore >= patternPassScore;
    var tc = isPassed ? '#ffd700' : '#e74c3c';
    
    document.getElementById('rinfo').innerHTML = 
        '<div class="r-row"><span class="r-label">姓名：</span>'+USER_NAME+'  <span class="r-label">学号：</span>'+STUDENT_ID+'</div>' +
        '<div class="r-row"><span class="r-label">今日组别：</span>' + selectedToday + '</div>' +
        '<div class="r-row"><span class="r-label">版型：</span>阴影迷踪</div>' +
        '<div class="r-row"><span class="r-label">抽取版型：</span>' + selectedPattern + '</div>' +
        '<div class="r-row"><span class="r-label">基础词汇：</span><span style="color:' + (basicScore >= 18 ? '#ffd700' : '#e74c3c') + ';font-weight:bold;">' + basicScore.toFixed(2) + '/30</span></div>' +
        '<div class="r-row"><span class="r-label">' + selectedPattern + '：</span><span style="color:' + (patternScore >= 15 ? '#ffd700' : '#e74c3c') + ';font-weight:bold;">' + patternScore.toFixed(2) + '/20</span></div>' +
        '<div class="r-row"><span class="r-label">总得分：</span><span style="color:' + tc + ';font-weight:bold;font-size:1.1em;">' + totalScore.toFixed(2) + '/50</span></div>' +
        '<div class="r-row"><span class="r-label">通过标准：</span>' + patternPassScore + '分</div>';
    
    document.getElementById('rphoto').innerHTML = isPassed ?
        '<img src="/static/images/通过.png" style="max-width:100%;max-height:110px;" onerror="this.innerHTML=\'<span style=color:#ffd700;>通过</span>\'">' :
        '<img src="/static/images/挂科.png" style="max-width:100%;max-height:110px;" onerror="this.innerHTML=\'<span style=color:#e74c3c;>挂科</span>\'">';
    
    // 构建表格数据
    var all = [];
    
    // 基础词汇30个
    basicResults.forEach(function(r) {
        all.push({
            word: r.word, pos: r.pos, meaning: r.meaning,
            score: r.score_display,
            cls: r.score >= 0.99 ? 'td-green' : (r.score >= 0.5 ? 'td-gold' : 'td-red')
        });
    });
    while (all.length < 30) {
        all.push({word: '-', pos: '-', meaning: '-', score: '0.00', cls: 'td-red'});
    }
    
    // 版型结果
    if (selectedPattern === '诡影重重' && shadowResults.length > 0) {
        shadowResults.forEach(function(r) {
            all.push({
                word: r.word, pos: r.pos || '', meaning: r.meaning,
                score: r.score_display,
                cls: r.score >= 1 ? 'td-green' : (r.score >= 0.75 ? 'td-gold' : 'td-red')
            });
        });
        while (all.length < 60) {
            all.push({word: '-', pos: '-', meaning: '-', score: '0.00', cls: 'td-red'});
        }
    } else if (selectedPattern === '七十二变' && patternResults.length > 0) {
        patternResults.forEach(function(r) {
            all.push({
                word: r.word, pos: r.pos || '', meaning: r.meaning,
                score: r.is_correct ? '1.00' : '0.00',
                cls: r.is_correct ? 'td-green' : 'td-red'
            });
        });
        while (all.length < 50) {
            all.push({word: '-', pos: '-', meaning: '-', score: '0.00', cls: 'td-red'});
        }
    } else if (selectedPattern === '三十六计' && patternResults.length > 0) {
        patternResults.forEach(function(r) {
            all.push({
                word: r.word, pos: r.pos || '', meaning: r.target_meaning || r.meaning,
                score: r.is_correct ? '1.00' : '0.00',
                cls: r.is_correct ? 'td-green' : 'td-red'
            });
        });
        while (all.length < 60) {
            all.push({word: '-', pos: '-', meaning: '-', score: '0.00', cls: 'td-red'});
        }
    } else if (selectedPattern === '盗宝大师') {
        // 盗宝大师没有单词详情，补充空数据
        while (all.length < 50) {
            all.push({word: '-', pos: '-', meaning: '-', score: '0.00', cls: 'td-red'});
        }
    }
    
    // 渲染表格
    var rows = Math.ceil(all.length / 3);
    var h = '';
    for (var r = 0; r < rows; r++) {
        h += '<tr><td style="color:#ffd700;font-weight:bold;background:#1a1a2a;">' + ((r + 1) < 10 ? '0' : '') + (r + 1) + '</td>';
        for (var c = 0; c < 3; c++) {
            var idx = r * 3 + c;
            if (idx < all.length) {
                var w = all[idx];
                h += '<td class="' + w.cls + '">' + w.word + '</td>' +
                     '<td style="color:#ffd700;">' + w.pos + '</td>' +
                     '<td>' + w.meaning + '</td>' +
                     '<td class="' + w.cls + '">' + w.score + '</td>';
            } else {
                h += '<td>-</td><td>-</td><td>-</td><td>-</td>';
            }
            if (c < 2) h += '<td style="background:#1a1a2a;"></td>';
        }
        h += '</tr>';
    }
    document.getElementById('rbody').innerHTML = h;
}

// ============ 导出PNG（占位） ============
async function exportPNG() {
    var btn = event.target;
    btn.disabled = true; btn.textContent = '生成中...';
    var resp = await fetch('/api/shadow_hunter/export_png', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            basic_results: basicResults,
            pattern_results: patternResults,
            total_score: basicScore + patternScore,
            pattern_score: patternScore,
            basic_score: basicScore,
            is_passed: (basicScore + patternScore) >= patternPassScore,
            today_group: selectedToday,
            selected_pattern: selectedPattern,
            pass_score: patternPassScore
        })
    });
    var data = await resp.json();
    btn.disabled = false; btn.textContent = '📄 导出PNG证书';
    if (data.success && data.image) {
        var a = document.createElement('a');
        a.download = '阴影迷踪考试报告.png';
        a.href = 'data:image/png;base64,' + data.image;
        a.click();
    } else {
        alert('导出失败: ' + (data.message || '未知错误'));
    }
}
