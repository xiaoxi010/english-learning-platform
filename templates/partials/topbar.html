<header class="top-bar">
    <div class="top-bar-left">
        {% if page_title %}
        <h1 class="top-title">{{ page_title }}</h1>
        {% endif %}
        {% if page_subtitle %}
        <p class="top-subtitle">{{ page_subtitle }}</p>
        {% endif %}
    </div>
    <div class="top-bar-right">
        {% if logged_in_user %}
        <span class="local-user">{{ user_name }}</span>
        {% if student_id %}<span class="user-id">{{ student_id }}</span>{% endif %}
        <span class="user-id" title="剩余积分">💰 {{ credits }}</span>
        <a href="{{ url_for('logout') }}" class="logout-btn">登出</a>
        {% else %}
        <span class="user-name">未登录</span>
        <a href="{{ url_for('login') }}" class="login-btn">登录</a>
        {% endif %}
    </div>
</header>
