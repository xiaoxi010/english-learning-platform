<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ pattern_name }} - 考试</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/exam-vocab.css') }}">
<style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-user-select:none; -moz-user-select:none; -ms-user-select:none; }
        body { font-family:"Microsoft YaHei",sans-serif;  min-height:100vh; color:var(--text-primary); padding-bottom:40px; }
        .header { background:var(--bg-primary); padding:10px 25px; display:flex; justify-content:space-between; align-items:center; }
        .header h1 { font-size:1.3em; color:#ffd700; }
        .back-btn { color:var(--text-secondary); text-decoration:none; padding:6px 14px; border-radius:20px; background:var(--bg-secondary); font-size:0.9em; }
        .main-wrap { max-width:1400px; margin:0 auto; padding:12px; }
        .panel { background:var(--bg-card); border:1px solid var(--border-color); border-radius:8px; padding:20px; margin-bottom:15px; }
        .panel h2 { color:#ffd700; margin-bottom:18px; font-size:1.5em; text-align:center; }
        .select-row { display:flex; gap:20px; margin-bottom:18px; justify-content:center; flex-wrap:wrap; }
        .select-group { min-width:300px; text-align:left; position:relative; }
        .select-group label { display:block; color:#ffd700; margin-bottom:5px; font-weight:bold; font-size:0.9em; }
        .select-group input { width:100%; padding:10px; border-radius:8px; background:var(--bg-secondary); color:var(--text-primary); border:1px solid var(--border-color); font-size:0.95em; user-select:text; -webkit-user-select:text; }
        .select-group input:focus { outline:none; border-color:#ffd700; }
        .dropdown { position:absolute; top:100%; left:0; right:0; max-height:200px; overflow-y:auto; background:var(--bg-secondary); border:1px solid var(--border-color); border-radius:0 0 8px 8px; z-index:10; display:none; }
        .dropdown div { padding:8px 10px; cursor:pointer; font-size:0.9em; }
        .dropdown div:hover { background:rgba(255,215,0,0.15); }
        .dropdown::-webkit-scrollbar { width:0px; }
        .btn { padding:10px 24px; border:none; border-radius:8px; cursor:pointer; font-size:0.95em; font-weight:bold; transition:all 0.2s; color:var(--text-primary); }
        .btn-gold { background:#ffd700; color:#000; }
        .btn-green { background:#ffd700; }
        .btn-purple { background:#ffd700; }
        .btn-orange { background:#ffd700; }
        .btn-outline { background:transparent; border:2px solid #ffd700; color:#ffd700; }
        .timer { font-size:2.2em; color:#ffd700; font-weight:bold; margin-bottom:8px; text-align:center; }
        .timer.warning { color:#e74c3c; animation:blink 1s infinite; }
        @keyframes blink { 50%{opacity:0.5;} }
        .instruction { color:var(--text-secondary); text-align:center; margin-bottom:12px; font-size:0.9em; }
        .stage-indicator { text-align:center; color:#ffd700; font-size:1.1em; margin-bottom:10px; }
        .word-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:8px; margin-bottom:18px; }
        .word-card { background:var(--bg-secondary); border-radius:8px; padding:10px 8px; text-align:center; border:2px solid #333; }
        .word-card .w-num { font-size:0.7em; color:#888; }
        .word-card .w-word { font-size:0.95em; font-weight:bold; color:#ffd700; margin:3px 0; }
        .word-card .w-pos { font-size:0.7em; color:#ffd700; margin-bottom:6px; }
        .word-card input { width:100%; padding:6px; border-radius:4px; border:1px solid var(--border-color); background:rgba(0,0,0,0.3); color:var(--text-primary); font-size:0.85em; text-align:center; user-select:text; -webkit-user-select:text; }
        .word-card input:focus { outline:none; border-color:#ffd700; }
        .correction-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:8px; margin-bottom:18px; }
        .correction-card { background:var(--bg-secondary); border-radius:8px; padding:8px; text-align:center; border:3px solid transparent; }
        .correction-card.border-green { border-color:#ffd700; background:#1a2a1a; }
        .correction-card.border-red { border-color:#e74c3c; background:#2a1a1a; }
        .correction-card.border-yellow { border-color:#ffd700; background:rgba(255,215,0,0.15); }
        .correction-card .c-word { font-weight:bold; color:#ffd700; font-size:0.9em; margin-bottom:4px; }
        .correction-card .c-user { font-size:0.8em; margin-bottom:2px; }
        .correction-card .c-answer { font-size:0.8em; color:#ffd700; margin-bottom:6px; }
        .correction-card .c-btns { display:flex; gap:4px; justify-content:center; }
        .correction-card .c-btns button { padding:3px 8px; font-size:0.7em; border-radius:4px; border:none; cursor:pointer; color:var(--text-primary); }
        .correction-card .c-btns .btn-correct { background:var(--bg-secondary); }
        .correction-card .c-btns .btn-correct.active { background:#ffd700; }
        .correction-card .c-btns .btn-wrong { background:var(--bg-secondary); }
        .correction-card .c-btns .btn-wrong.active { background:#e74c3c; }
        .strategy-container { display:flex; flex-direction:column; gap:15px; }
        .meaning-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
        .meaning-area { background:var(--bg-secondary); border-radius:8px; padding:10px; text-align:center; border:2px solid #444; min-height:110px; cursor:pointer; transition:all 0.2s; }
        .meaning-area:hover { border-color:#ffd700; }
        .meaning-area .m-title { color:#ffd700; font-weight:bold; font-size:0.85em; margin-bottom:5px; }
        .meaning-area .m-word { background:var(--bg-secondary); padding:4px 8px; border-radius:4px; font-size:0.8em; color:#ffd700; margin:2px 0; }
        .hand-cards { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; min-height:90px; padding:10px; background:#111; border-radius:8px; }
        .hand-card { background:var(--bg-secondary); border-radius:8px; padding:60px 22px; text-align:center; border:2px solid #555; cursor:pointer; transition:all 0.2s; min-width:130px; }
        .hand-card:hover { border-color:#ffd700; background:#3a3020; }
        .hand-card.selected { border-color:#ffd700 !important; background:#3a3020 !important; }
        .hand-card .hc-word { font-weight:bold; color:#ffd700; font-size:1.1em; }
        .score-bar { text-align:center; font-size:1.2em; margin:10px 0; }
        .summary-table { width:100%; border-collapse:collapse; font-size:0.8em; margin-bottom:15px; }
        .summary-table th { background:var(--bg-card); padding:6px 4px; }
        .summary-table td { padding:5px 4px; text-align:center; border-bottom:1px solid var(--bg-secondary); }
        .report-top { display:flex; gap:15px; margin-bottom:15px; }
        .report-info { flex:1; background:var(--bg-secondary); border:1px solid #fff; padding:10px; }
        .report-info .r-row { padding:3px 0; font-size:0.8em; }
        .report-info .r-label { color:#ffd700; font-weight:bold; }
        .report-photo { width:200px; background:var(--bg-secondary); border:1px solid #fff; display:flex; align-items:center; justify-content:center; font-size:1.3em; font-weight:bold; overflow:hidden; }
        .report-photo img { max-width:100%; max-height:110px; }
        .report-table-wrap { background:var(--bg-secondary); border:1px solid #fff; max-height:40vh; overflow-y:auto; }
        .report-table-wrap::-webkit-scrollbar { width:0; }
        .report-table { width:100%; border-collapse:collapse; font-size:0.7em; }
        .report-table th { background:var(--bg-card); padding:4px 2px; position:sticky; top:0; }
        .report-table td { padding:3px 2px; text-align:center; border:1px solid rgba(255,255,255,0.3); }
        .td-green { color:#ffd700; font-weight:bold; }
        .td-red { color:#e74c3c; font-weight:bold; }
        .hidden { display:none !important; }
        .btn-row { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:12px; }
        .tabs { display:flex; gap:5px; margin-bottom:10px; }
        .tab-btn { padding:8px 16px; border:none; border-radius:8px 8px 0 0; cursor:pointer; background:var(--bg-secondary); color:var(--text-secondary); font-size:0.9em; }
        .tab-btn.active { background:#ffd700; color:var(--text-primary); }
        .tab-content { display:none; }
        .tab-content.active { display:block; }
    </style>
</head>
<body class="exam-vocab-page">
<div class="header"><h1>📊 {{ pattern_name }}</h1><a href="/" class="back-btn">← 返回主菜单</a></div>
<div class="main-wrap">

<div class="panel" id="s1">
    <h2>考试设置</h2>
    <div class="select-row">
        <div class="select-group"><label>📅 今日单词组</label><input type="text" id="todayInput" placeholder="选择或搜索..." oninput="filterGroups('today')" onfocus="showDropdown('today')" autocomplete="off"><div class="dropdown" id="todayDropdown"></div></div>
        <div class="select-group"><label>📅 昨日单词组</label><input type="text" id="yesterdayInput" placeholder="选择或搜索..." oninput="filterGroups('yesterday')" onfocus="showDropdown('yesterday')" autocomplete="off"><div class="dropdown" id="yesterdayDropdown"></div></div>
    </div>
    <div style="text-align:center"><button class="btn btn-orange" id="btnStart" onclick="startExam()">开始考试</button></div>
</div>

<div class="panel hidden" id="s2">
    <div class="stage-indicator">📝 阶段 1/2：基础词汇（30个）</div><div class="timer" id="timer1">300</div>
    <p class="instruction">请写出以下英文单词的中文意思：</p><div class="word-grid" id="basicGrid"></div>
    <div style="text-align:center"><button class="btn btn-green" onclick="submitBasic()">我已完成，进入批改</button></div>
</div>

<div class="panel hidden" id="s3">
    <h2>📝 批改基础词汇</h2>
    <p class="instruction" style="font-size:0.8em;color:#888;">🟢 绿色=正确 | 🔴 红色=错误 | 🟡 黄色=需判断</p>
    <div class="correction-grid" id="basicCorrGrid"></div>
    <div class="score-bar">基础词汇得分: <span id="basicScore" style="color:#ffd700;">0</span>/30</div>
    <div class="btn-row"><button class="btn btn-purple" onclick="goToStrategy()">✅ 进入三十六计 →</button></div>
</div>

<div class="panel hidden" id="s4">
    <div class="stage-indicator">📊 阶段 2/2：三十六计</div>
    <div class="timer" id="timer2">420</div>
    <p class="instruction">点击手牌选中，再点击汉译区域放置。放置后不可移回！</p>
    <div class="strategy-container"><div class="meaning-grid" id="meaningGrid"></div><div class="hand-cards" id="handCards"></div></div>
    <div style="text-align:center;margin-top:15px;"><button class="btn btn-orange" onclick="submitStrategy()">交 卷</button></div>
</div>

<div class="panel hidden" id="s5">
    <h2>📊 版型考试总结</h2>
    <div class="score-bar">版型得分: <span id="summaryStrategyScore" style="color:#ffd700;">0</span>/20</div>
    <div class="tabs">
        <button class="tab-btn active" onclick="switchSummaryTab('areas')">汉译区域得分</button>
        <button class="tab-btn" onclick="switchSummaryTab('words')">30个单词详情</button>
    </div>
    <div class="tab-content active" id="tab-areas"><div id="summaryAreas"></div></div>
    <div class="tab-content" id="tab-words"><div id="summaryWords"></div></div>
    <div class="btn-row"><button class="btn btn-purple" onclick="showFinalReport()">📊 查看总成绩报告</button></div>
</div>

<div class="panel hidden" id="s6">
    <h2 style="color:#ffd700;text-align:center;margin-bottom:12px;">📊 {{ pattern_name }}考试总成绩报告</h2>
    <div class="report-top"><div class="report-info" id="rinfo"></div><div class="report-photo" id="rphoto"></div></div>
    <div class="report-table-wrap"><table class="report-table"><thead><tr>
        <th style="background:#1a1a2a;color:#ffd700;">行号</th><th style="background:#ffd700;color:var(--text-primary);">单词</th><th style="background:#ffd700;color:var(--text-primary);">词性</th><th>汉译</th><th>得分</th>
        <th style="width:8px;"></th><th style="background:#ffd700;color:var(--text-primary);">单词</th><th style="background:#ffd700;color:var(--text-primary);">词性</th><th>汉译</th><th>得分</th>
        <th style="width:8px;"></th><th style="background:#ffd700;color:var(--text-primary);">单词</th><th style="background:#ffd700;color:var(--text-primary);">词性</th><th>汉译</th><th>得分</th>
    </tr></thead><tbody id="rbody"></tbody></table></div>
    <div class="btn-row"><button class="btn btn-green" onclick="exportPNG()">📄 导出PNG证书</button><button class="btn btn-gold" onclick="location.reload()">🔄 重新考试</button><button class="btn btn-outline" onclick="window.location.href='/'">🏠 返回主菜单</button></div>
</div>
</div>

<script>
var USER_NAME = "{{ user_name }}";
var STUDENT_ID = "{{ student_id }}";
var PASS_SCORE={{pass_score}},FULL_SCORE={{full_score}};
var allGroups=[{% for g in groups %}"{{g}}",{% endfor %}];
var examId='',basicWords=[],basicResults=[],basicScore=0;
var meanings=[],handCards=[],placements={},selectedCard=null,allCards={};
var strategyScore=0,strategyResults=[],strategyMeanings=[],totalScore=0,isPassed=false,timerInterval=null,timeLeft=300,selectedToday='',selectedYesterday='';

function filterGroups(t){var v=document.getElementById(t+'Input').value.toLowerCase();document.getElementById(t+'Dropdown').innerHTML=allGroups.filter(function(g){return g.toLowerCase().indexOf(v)>=0;}).map(function(g){return '<div onclick="selectGroup(\''+t+'\',\''+g.replace(/'/g,"\\'")+'\')">'+g+'</div>';}).join('');document.getElementById(t+'Dropdown').style.display='block';}
function showDropdown(t){filterGroups(t);}
function selectGroup(t,n){document.getElementById(t+'Input').value=n;document.getElementById(t+'Dropdown').style.display='none';if(t==='today')selectedToday=n;else selectedYesterday=n;}
document.addEventListener('click',function(e){if(!e.target.closest('.select-group')){document.querySelectorAll('.dropdown').forEach(function(d){d.style.display='none';});}});
function renderWordGrid(gid,words,pre){document.getElementById(gid).innerHTML=words.map(function(w,i){return '<div class="word-card"><div class="w-num">'+(i+1)+'</div><div class="w-word">'+w.word+'</div><div class="w-pos">'+w.pos+'</div><input type="text" id="'+pre+i+'" placeholder="中文意思" onkeydown="hk(event,'+i+',\''+pre+'\')"></div>';}).join('');}
function hk(e,i,pre){var n=i;if(e.key==='Enter'||e.key==='Tab'){e.preventDefault();n=i+1;}else if(e.key==='ArrowUp'){e.preventDefault();n=i-6;}else if(e.key==='ArrowDown'){e.preventDefault();n=i+6;}else return;if(n>=0&&n<basicWords.length)document.getElementById(pre+n)&&document.getElementById(pre+n).focus();}
function startTimer(el,cb){timeLeft=el==='timer1'?300:420;clearInterval(timerInterval);timerInterval=setInterval(function(){timeLeft--;document.getElementById(el).textContent=timeLeft;document.getElementById(el).className='timer'+(timeLeft<=30?' warning':'');if(timeLeft<=0){clearInterval(timerInterval);cb();}},1000);document.getElementById(el).textContent=timeLeft;}

async function startExam(){
    if(!selectedToday||!selectedYesterday)return alert('请选择今日和昨日单词组');
    var btn=document.getElementById('btnStart');btn.disabled=true;btn.textContent='正在出题，请耐心等待···';btn.style.opacity='0.6';
    try{
        var r=await fetch('/api/thirty_six/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({today_group:selectedToday,yesterday_group:selectedYesterday})});
        var d=await r.json();if(!d.success){alert(d.message);btn.disabled=false;btn.textContent='开始考试';btn.style.opacity='1';return;}
        examId=d.exam_id;basicWords=d.words;switchStage('s2');
        renderWordGrid('basicGrid',basicWords,'a');startTimer('timer1',submitBasic);
        setTimeout(function(){document.getElementById('a0')&&document.getElementById('a0').focus();},100);
    }catch(e){alert('加载失败');btn.disabled=false;btn.textContent='开始考试';btn.style.opacity='1';}
}
async function submitBasic(){
    clearInterval(timerInterval);var ans={};basicWords.forEach(function(w,i){var e=document.getElementById('a'+i);ans[i]=e?e.value:'';});
    var r=await fetch('/api/thirty_six/submit_basic',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({exam_id:examId,answers:ans})});
    var d=await r.json();if(!d.success)return alert(d.message);
    basicResults=d.results;basicScore=d.score;switchStage('s3');
    document.getElementById('basicCorrGrid').innerHTML=basicResults.map(function(r,i){var bc=r.auto_status==='correct'?'border-green':(r.auto_status==='wrong'?'border-red':'border-yellow');return '<div class="correction-card '+bc+'" id="bc'+i+'"><div class="c-word">'+(i+1)+'. '+r.word+'</div><div class="c-user" style="color:'+(r.is_correct?'#2ecc71':'#e74c3c')+'">你的: '+(r.user_answer||'(未作答)')+'</div><div class="c-answer">答案: '+r.meaning+'</div><div class="c-btns"><button class="btn-correct'+(r.is_correct?' active':'')+'" onclick="bmc('+i+')">正确</button><button class="btn-wrong'+(!r.is_correct?' active':'')+'" onclick="bmw('+i+')">错误</button></div></div>';}).join('');
    document.getElementById('basicScore').textContent=basicScore;
}
function bmc(i){if(!basicResults[i].is_correct){basicResults[i].is_correct=true;basicScore++;}updateBasicCard(i);}
function bmw(i){if(basicResults[i].is_correct){basicResults[i].is_correct=false;basicScore--;}updateBasicCard(i);}
function updateBasicCard(i){
    var c=document.getElementById('bc'+i),r=basicResults[i];
    r.score = r.is_correct ? '1.00' : '0.00';  // 新增这行
    c.className='correction-card '+(r.is_correct?'border-green':'border-red');
    c.querySelector('.btn-correct').classList.toggle('active',r.is_correct);
    c.querySelector('.btn-wrong').classList.toggle('active',!r.is_correct);
    c.querySelector('.c-user').style.color=r.is_correct?'#2ecc71':'#e74c3c';
    document.getElementById('basicScore').textContent=basicScore;
}

async function goToStrategy(){
    var corr={};basicResults.forEach(function(r,i){corr[i]=r.is_correct;});
    var r=await fetch('/api/thirty_six/start_strategy',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({exam_id:examId,corrections:corr})});
    var d=await r.json();if(!d.success)return alert(d.message);
    meanings=d.meanings;handCards=d.hand_cards;placements=d.placements||{};basicScore=d.basic_score;selectedCard=null;
    allCards={};handCards.forEach(function(c){allCards[c.id]=c;});
    switchStage('s4');renderStrategy();startTimer('timer2',submitStrategy);
}
function renderStrategy(){
    var gh='';
    for(var i=0;i<10;i++){
        var m=meanings[i];var pw=[];
        for(var k in placements){if(placements[k]===i&&allCards[k]){pw.push(allCards[k].word);}}
        gh+='<div class="meaning-area" onclick="placeCard('+i+')"><div class="m-title">'+m.meaning+'</div>';
        for(var j=0;j<pw.length;j++){gh+='<div class="m-word">'+pw[j]+'</div>';}
        gh+='</div>';
    }
    document.getElementById('meaningGrid').innerHTML=gh;
    document.getElementById('handCards').innerHTML=handCards.map(function(c){return '<div class="hand-card'+(selectedCard===c.id?' selected':'')+'" onclick="selectHandCard(\''+c.id+'\')"><div class="hc-word">'+c.word+'</div></div>';}).join('');
}
function selectHandCard(id){selectedCard=(selectedCard===id?null:id);renderStrategy();}
async function placeCard(mi){
    if(!selectedCard)return;
    var r=await fetch('/api/thirty_six/place_card',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({exam_id:examId,card_id:selectedCard,meaning_index:mi})});
    var d=await r.json();if(!d.success)return alert(d.message);
    handCards=d.hand_cards;placements=d.placements;selectedCard=null;
    handCards.forEach(function(c){allCards[c.id]=c;});renderStrategy();
}

async function submitStrategy(){
    clearInterval(timerInterval);
    var corr={};basicResults.forEach(function(r,i){corr[i]=r.is_correct;});
    var r=await fetch('/api/thirty_six/submit_strategy',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({exam_id:examId,corrections:corr})});
    var d=await r.json();if(!d.success)return alert(d.message);
    strategyScore=d.strategy_score;strategyResults=d.results;basicScore=d.basic_score;totalScore=d.total_score;isPassed=d.is_passed;
    strategyMeanings=d.meanings||meanings;
    examData = d;
    switchStage('s5');renderSummary();
}
function renderSummary(){
    document.getElementById('summaryStrategyScore').textContent=strategyScore;
    var areaCorrect = examData.area_correct || {};
    var ah='<table class="summary-table"><tr><th>序号</th><th>汉译</th><th>放置的单词</th><th>正确单词</th><th>得分</th></tr>';
    for(var i=0;i<10;i++){
        var m=meanings[i];
        var placedWords=[], correctWords=[];
        // 放置的单词
        for(var k in placements){
            if(placements[k]===i && allCards[k]){
                placedWords.push(allCards[k].word);
            }
        }
        // 正确答案：在所有卡片中找target_meaning与当前汉译匹配的
        for(var j=0;j<strategyResults.length;j++){
            if(strategyResults[j].target_meaning === m.meaning){
                correctWords.push(strategyResults[j].word);
            }
        }
        // 如果strategyResults中没有，从allCards中查找
        if(correctWords.length === 0){
            for(var k in allCards){
                if(allCards[k].target_meaning === m.meaning || allCards[k].meaning === m.meaning){
                    if(correctWords.indexOf(allCards[k].word) < 0){
                        correctWords.push(allCards[k].word);
                    }
                }
            }
        }
        var matches=areaCorrect[i]||0;
        var score=matches>=2?2:(matches==1?1:0);
        ah+='<tr><td>'+(i+1)+'</td><td>'+m.meaning+'</td><td style="color:#ffd700;">'+(placedWords.join(', ')||'无')+'</td><td style="color:#ffd700;">'+(correctWords.join(', ')||'无')+'</td><td style="color:'+(score>=2?'#ffd700':(score>=1?'#2ecc71':'#e74c3c'))+'">'+score+'分</td></tr>';
    }
    ah+='</table>';
    document.getElementById('summaryAreas').innerHTML=ah;

    // 30个单词详情
    var wh='<table class="summary-table"><tr><th>序号</th><th>单词</th><th>词性</th><th>汉译</th><th>目标汉译</th></tr>';
    for(var i=0;i<strategyResults.length;i++){
        var r=strategyResults[i];
        wh+='<tr><td>'+(i+1)+'</td><td style="color:#ffd700;font-weight:bold;">'+r.word+'</td><td style="color:#ffd700;">'+r.pos+'</td><td>'+r.meaning+'</td><td style="color:#ffd700;">'+r.target_meaning+'</td></tr>';
    }
    wh+='</table>';
    document.getElementById('summaryWords').innerHTML=wh;
}
function switchSummaryTab(tab){
    document.querySelectorAll('.tab-btn').forEach(function(b,i){b.classList.toggle('active',(tab==='areas'&&i===0)||(tab==='words'&&i===1));});
    document.getElementById('tab-areas').classList.toggle('active',tab==='areas');
    document.getElementById('tab-words').classList.toggle('active',tab==='words');
}

function showFinalReport(){
    switchStage('s6');var tc=isPassed?'#2ecc71':'#e74c3c';
    document.getElementById('rinfo').innerHTML='<div class="r-row"><span class="r-label">姓名：</span>'+USER_NAME+'  <span class="r-label">学号：</span>'+STUDENT_ID+'</div><div class="r-row"><span class="r-label">今日组别：</span>'+selectedToday+'</div><div class="r-row"><span class="r-label">版型：</span>三十六计</div><div class="r-row"><span class="r-label">基础词汇：</span><span style="color:'+(basicScore>=18?'#2ecc71':'#e74c3c')+';font-weight:bold;">'+basicScore.toFixed(2)+'/30</span></div><div class="r-row"><span class="r-label">三十六计：</span><span style="color:'+(strategyScore>=25?'#ffd700':'#e74c3c')+';font-weight:bold;">'+strategyScore+'/20</span></div><div class="r-row"><span class="r-label">总得分：</span><span style="color:'+tc+';font-weight:bold;font-size:1.1em;">'+totalScore.toFixed(2)+'/50</span></div>';
    document.getElementById('rphoto').innerHTML=isPassed?'<img src="/static/images/通过.png" style="max-width:100%;max-height:110px;" onerror="this.innerHTML=\'<span style=color:#ffd700;>通过</span>\'">':'<img src="/static/images/挂科.png" style="max-width:100%;max-height:110px;" onerror="this.innerHTML=\'<span style=color:#e74c3c;>挂科</span>\'">';
    var all=[];basicResults.forEach(function(r){all.push({word:r.word,pos:r.pos,meaning:r.meaning,score:r.score,cls:r.is_correct?'td-green':'td-red'});});while(all.length<30)all.push({word:'-',pos:'-',meaning:'-',score:'0.00',cls:'td-red'});
    strategyResults.forEach(function(r){
        all.push({
            word: r.word,
            pos: r.pos || '',
            meaning: r.meaning,  // ← 改这里：单词本身的正确含义
            score: r.score,
            cls: r.is_correct ? 'td-green' : 'td-red'
        });
    });
    var h='';for(var r=0;r<20;r++){h+='<tr><td style="color:#ffd700;font-weight:bold;">'+((r+1)<10?'0':'')+(r+1)+'</td>';for(var c=0;c<3;c++){var i=r*3+c;if(i<all.length){var w=all[i];h+='<td class="'+w.cls+'">'+w.word+'</td><td style="color:#ffd700;">'+w.pos+'</td><td>'+w.meaning+'</td><td class="'+w.cls+'">'+w.score+'</td>';}else{h+='<td>-</td><td>-</td><td>-</td><td>-</td>';}}h+='</tr>';}document.getElementById('rbody').innerHTML=h;
}
function switchStage(id){['s1','s2','s3','s4','s5','s6'].forEach(function(s){var el=document.getElementById(s);if(s===id)el.classList.remove('hidden');else el.classList.add('hidden');});}
async function exportPNG(){
    var btn=event.target;btn.disabled=true;btn.textContent='生成中...';
    var resp=await fetch('/api/thirty_six/export_png',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
            basic_results:basicResults,
            strategy_results:strategyResults,
            total_score:totalScore,
            strategy_score:strategyScore,
            basic_score:basicScore,
            is_passed:isPassed,
            today_group:selectedToday,
            user_name: USER_NAME,      // ← 新增
            student_id: STUDENT_ID     // ← 新增
        })});
    var data=await resp.json();btn.disabled=false;btn.textContent='📄 导出PNG证书';
    if(data.success&&data.image){var a=document.createElement('a');a.download='三十六计考试报告.png';a.href='data:image/png;base64,'+data.image;a.click();}
    else{alert('导出失败: '+(data.message||'未知错误'));}
}
