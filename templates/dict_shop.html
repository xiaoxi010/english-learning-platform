<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>词库商城 - 英语学习平台</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .shop-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .shop-header {
            margin-bottom: 32px;
        }
        .shop-header h1 {
            font-size: 1.25em;
            color: var(--text-primary);
            font-weight: 600;
        }
        .shop-header p {
            color: var(--text-secondary);
            font-size: 0.9em;
            margin-top: 6px;
        }
        .dict-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        .dict-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            transition: border-color 0.15s;
        }
        .dict-card:hover {
            border-color: var(--accent-green);
        }
        .dict-icon {
            font-size: 3em;
            text-align: center;
            margin-bottom: 15px;
        }
        .dict-name {
            font-size: 1.1em;
            font-weight: 600;
            text-align: center;
            margin-bottom: 10px;
            color: var(--text-primary);
        }
        .dict-desc {
            color: var(--text-secondary);
            font-size: 0.9em;
            text-align: center;
            margin-bottom: 15px;
            line-height: 1.4;
            min-height: 2.8em;
        }
        .dict-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
            padding: 10px;
            background: var(--bg-secondary);
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }
        .dict-info span {
            color: var(--accent-green);
            font-weight: 500;
            font-size: 0.9em;
        }
        .buy-btn {
            display: block;
            width: 100%;
            padding: 10px;
            background: var(--accent-green);
            color: #0d0d0d;
            border: none;
            border-radius: 6px;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .buy-btn:hover:not(:disabled) {
            opacity: 0.88;
        }
        .buy-btn:disabled,
        .buy-btn.owned {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            cursor: default;
        }
    </style>
</head>
<body>
{% set show_sidebar = true %}
{% set active_nav = active_nav | default('dict_shop') %}
{% set page_title = '词典商城' %}
{% set page_subtitle = '从商城数据库挑选词典，一键导入到你的词汇数据库' %}
{% include 'partials/app_shell_open.html' %}
    <div class="shop-container">
        <div class="dict-grid" id="dictGrid">
            <div style="text-align: center; grid-column: 1/-1;">加载中...</div>
        </div>
    </div>
{% include 'partials/app_shell_close.html' %}

    <script>
        async function loadDictShop() {
            try {
                const resp = await fetch('/api/dict_shop/list');
                const result = await resp.json();
                if (result.success) {
                    renderDicts(result.data);
                } else {
                    document.getElementById('dictGrid').innerHTML = '<div style="text-align: center;">加载失败</div>';
                }
            } catch (e) {
                document.getElementById('dictGrid').innerHTML = '<div style="text-align: center;">加载失败</div>';
            }
        }

        function renderDicts(dicts) {
            const grid = document.getElementById('dictGrid');
            if (!dicts || dicts.length === 0) {
                grid.innerHTML = '<div style="text-align: center; grid-column: 1/-1;">商城暂无词典，请先在「商城数据库」中添加</div>';
                return;
            }

            grid.innerHTML = dicts.map(d => {
                const owned = d.owned;
                const price = d.price || 0;
                const btnText = owned ? '已拥有' : (price === 0 ? '免费获取' : `购买 (${price} 积分)`);
                return `
                <div class="dict-card">
                    <div class="dict-icon">${escapeHtml(d.icon || '📚')}</div>
                    <div class="dict-name">${escapeHtml(d.dict_name)}</div>
                    <div class="dict-desc">${escapeHtml(d.description || '暂无描述')}</div>
                    <div class="dict-info">
                        <span>📊 ${d.word_count || 0} 词</span>
                        <span>💰 ${price} 积分</span>
                    </div>
                    <button class="buy-btn ${owned ? 'owned' : ''}"
                            data-name="${escapeAttr(d.dict_name)}"
                            ${owned ? 'disabled' : ''}>
                        ${btnText}
                    </button>
                </div>`;
            }).join('');

            document.querySelectorAll('.buy-btn:not(.owned)').forEach(btn => {
                btn.addEventListener('click', () => buyDict(btn.dataset.name, btn));
            });
        }

        async function buyDict(dictName, btn) {
            if (!confirm(`确定要将「${dictName}」导入到词汇数据库吗？`)) return;
            btn.disabled = true;
            btn.textContent = '导入中...';
            try {
                const resp = await fetch('/api/dict_shop/buy', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ dict_name: dictName }),
                });
                const result = await resp.json();
                alert(result.message);
                if (result.success) {
                    loadDictShop();
                } else {
                    btn.disabled = false;
                    btn.textContent = '免费获取';
                }
            } catch (e) {
                alert('导入失败: ' + e.message);
                btn.disabled = false;
                btn.textContent = '免费获取';
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function escapeAttr(text) {
            return String(text || '').replace(/"/g, '&quot;');
        }

        loadDictShop();
    </script>
</body>
</html>
