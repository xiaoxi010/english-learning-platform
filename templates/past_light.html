<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ pattern_name }} - 考试</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/exam-vocab.css') }}">
<style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-user-select:none; -moz-user-select:none; -ms-user-select:none; }
        .exam-vocab-page .select-group input, .exam-vocab-page .word-card input { user-select:text; -webkit-user-select:text; }
        .correction-card .c-user { font-size:0.8em; margin-bottom:2px; }
        .correction-card .c-btns { display:flex; gap:4px; justify-content:center; }
        .report-top { display:flex; gap:12px; margin-bottom:12px; height:130px; }
        .report-info { display:flex; flex-direction:column; justify-content:center; }
        .report-info .r-value { color:#fff; }
        .report-photo { width:280px; }
        .report-photo img { max-width:100%; max-height:110px; object-fit:contain; }
        .report-table-wrap::-webkit-scrollbar { width:0; }
        .report-table-wrap:hover::-webkit-scrollbar { width:4px; }
        .report-table-wrap::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.15); border-radius:4px; }
        .report-table { font-size:0.72em; }
        .report-table th { z-index:1; }
        .report-table tr:nth-child(even) td { background:#252536; }
        .report-table tr:nth-child(odd) td { background:#2a2a3a; }
        .td-score { font-weight:bold; }
    </style>
</head>
<body class="exam-vocab-page">
<div class="header"><h1>✨ {{ pattern_name }}</h1><a href="/" class="back-btn">← 返回主菜单</a></div>
<div class="container">

<!-- 阶段1 -->
<div class="panel" id="s1">
    <h2>考试设置</h2>
    <div class="select-row">
        <div class="select-group">
            <label>📅 今日单词组（需≥20个）</label>
            <input type="text" id="todayInput" placeholder="选择或搜索..." oninput="filterGroups('today')" onfocus="showDropdown('today')" autocomplete="off">
            <div class="dropdown" id="todayDropdown"></div>
        </div>
        <div class="select-group">
            <label>📅 昨日单词组（需≥10个）</label>
            <input type="text" id="yesterdayInput" placeholder="选择或搜索..." oninput="filterGroups('yesterday')" onfocus="showDropdown('yesterday')" autocomplete="off">
            <div class="dropdown" id="yesterdayDropdown"></div>
        </div>
    </div>
    <div style="text-align:center"><button class="btn btn-gold" onclick="startExam()">开始考试</button></div>
</div>

<!-- 阶段2 -->
<div class="panel hidden" id="s2">
    <div class="timer" id="timer">300</div>
    <p class="instruction">请写出以下英文单词的中文意思：</p>
    <div class="word-grid" id="wordGrid"></div>
    <div style="text-align:center"><button class="btn btn-green" onclick="submitExam()">我已完成</button></div>
</div>

<!-- 阶段3 -->
<div class="panel hidden" id="s3">
    <h2>📝 请批改您的答案</h2>
    <p class="instruction" style="font-size:0.8em;color:#888;">🟢正确 🔴错误 🟡需判断（1个相同字符）</p>
    <div class="correction-grid" id="correctionGrid"></div>
    <div class="score-bar">基础词汇得分: <span id="cs" style="color:#ffd700;">0</span>/30</div>
    <div class="btn-row"><button class="btn btn-purple" onclick="finishCorrection()">批改完成</button></div>
</div>

<!-- 阶段4：完全复刻Tkinter布局 -->
<div class="panel hidden" id="s4">
    <h2 style="color:#ffd700;font-size:1.4em;margin-bottom:12px;">📊 昔日之光考试总成绩报告</h2>
    <div class="report-top">
        <div class="report-info" id="rinfo"></div>
        <div class="report-photo" id="rphoto"></div>
    </div>
    <div class="report-table-wrap">
        <table class="report-table">
            <thead><tr>
                <th style="color:var(--text-primary);background:#ffd700;width:14%;">单词</th>
                <th style="color:var(--text-primary);background:#ffd700;width:8%;">词性</th>
                <th style="color:var(--text-primary);width:28%;">汉译</th>
                <th style="color:var(--text-primary);width:10%;">得分</th>
                <th style="color:var(--text-primary);background:#ffd700;width:14%;">单词</th>
                <th style="color:var(--text-primary);background:#ffd700;width:8%;">词性</th>
                <th style="color:var(--text-primary);width:28%;">汉译</th>
                <th style="color:var(--text-primary);width:10%;">得分</th>
            </tr></thead>
            <tbody id="rbody"></tbody>
        </table>
    </div>
    <div class="btn-row">
        <button class="btn btn-green" onclick="exportPNG()">📄 导出PNG证书</button>
        <button class="btn btn-gold" onclick="location.reload()">🔄 重新考试</button>
        <button class="btn btn-outline" onclick="window.location.href='/'">🏠 返回主菜单</button>
    </div>
</div>
</div>

<script>
var USER_NAME = "{{ user_name }}";
var STUDENT_ID = "{{ student_id }}";
var PASS_SCORE={{pass_score}}, FULL_SCORE={{full_score}};
var allGroups=[{% for g in groups %}"{{g}}",{% endfor %}];
var words=[], results=[], totalScore=0, isPassed=false, timerInterval=null, timeLeft=300, examData={}, selectedToday='', selectedYesterday='';

function filterGroups(type){
    var val=document.getElementById(type+'Input').value.toLowerCase();
    var dd=document.getElementById(type+'Dropdown');
    dd.innerHTML=allGroups.filter(function(g){return g.toLowerCase().indexOf(val)>=0;}).map(function(g){return '<div onclick="selectGroup(\''+type+'\',\''+g.replace(/'/g,"\\'")+'\')">'+g+'</div>';}).join('');
    dd.style.display='block';
}
function showDropdown(type){ filterGroups(type); }
function selectGroup(type,name){
    document.getElementById(type+'Input').value=name;
    document.getElementById(type+'Dropdown').style.display='none';
    if(type==='today') selectedToday=name; else selectedYesterday=name;
}
document.addEventListener('click',function(e){if(!e.target.closest('.select-group')){document.querySelectorAll('.dropdown').forEach(function(d){d.style.display='none';});}});

async function startExam(){
    if(!selectedToday||!selectedYesterday) return alert('请选择今日和昨日单词组');
    var resp=await fetch('/api/past_light/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({today_group:selectedToday,yesterday_group:selectedYesterday})});
    var data=await resp.json();
    if(!data.success) return alert(data.message);
    words=data.words; switchStage('s2');
    document.getElementById('wordGrid').innerHTML=words.map(function(w,i){return '<div class="word-card"><div class="w-num">'+(i+1)+'</div><div class="w-word">'+w.word+'</div><div class="w-pos">'+w.pos+'</div><input type="text" id="a'+i+'" placeholder="中文意思" onkeydown="hk(event,'+i+')"></div>';}).join('');
    timeLeft=300; updateTimer();
    timerInterval=setInterval(function(){timeLeft--;updateTimer();if(timeLeft<=0)submitExam();},1000);
    setTimeout(function(){document.getElementById('a0')&&document.getElementById('a0').focus();},100);
}
function updateTimer(){var el=document.getElementById('timer');el.textContent=timeLeft;el.className='timer'+(timeLeft<=30?' warning':'');}
function hk(e,i){var n=i;if(e.key==='Enter'||e.key==='Tab'){e.preventDefault();n=i+1;}else if(e.key==='ArrowUp'){e.preventDefault();n=i-6;}else if(e.key==='ArrowDown'){e.preventDefault();n=i+6;}else if(e.key==='ArrowLeft'&&e.target.selectionStart===0){e.preventDefault();n=i-1;if(n%6===5)return;}else if(e.key==='ArrowRight'&&e.target.selectionStart===e.target.value.length){e.preventDefault();n=i+1;if(n%6===0)return;}else return;if(n>=0&&n<words.length)document.getElementById('a'+n)&&document.getElementById('a'+n).focus();}

async function submitExam(){
    clearInterval(timerInterval);
    var ans={};words.forEach(function(w,i){var el=document.getElementById('a'+i);ans[i]=el?el.value:'';});
    var resp=await fetch('/api/past_light/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({answers:ans,corrections:{}})});
    var data=await resp.json();
    if(!data.success) return alert(data.message);
    results=data.results;totalScore=data.correct_count;isPassed=data.is_passed;examData=data;
    switchStage('s3');renderCorrection();
}
function renderCorrection(){
    document.getElementById('correctionGrid').innerHTML=results.map(function(r,i){
        var bc='';if(r.auto_status==='correct')bc='border-green';else if(r.auto_status==='wrong')bc='border-red';else bc='border-yellow';
        return '<div class="correction-card '+bc+'" id="c'+i+'"><div class="c-word">'+(i+1)+'. '+r.word+'</div><div class="c-user" style="color:'+(r.is_correct?'#2ecc71':'#e74c3c')+'">你的: '+(r.user_answer||'(未作答)')+'</div><div class="c-answer">答案: '+r.meaning+'</div><div class="c-btns"><button class="btn-correct'+(r.is_correct?' active':'')+'" onclick="mc('+i+')">正确</button><button class="btn-wrong'+(!r.is_correct?' active':'')+'" onclick="mw('+i+')">错误</button></div></div>';
    }).join('');
    updateScore();
}
function mc(i){if(!results[i].is_correct){results[i].is_correct=true;totalScore++;}var c=document.getElementById('c'+i);c.className='correction-card border-green';c.querySelector('.btn-correct').classList.add('active');c.querySelector('.btn-wrong').classList.remove('active');c.querySelector('.c-user').style.color='#2ecc71';updateScore();}
function mw(i){if(results[i].is_correct){results[i].is_correct=false;totalScore--;}var c=document.getElementById('c'+i);c.className='correction-card border-red';c.querySelector('.btn-wrong').classList.add('active');c.querySelector('.btn-correct').classList.remove('active');c.querySelector('.c-user').style.color='#e74c3c';updateScore();}
function updateScore(){var el=document.getElementById('cs');el.textContent=totalScore;el.style.color=totalScore>=PASS_SCORE?'#2ecc71':'#e74c3c';}

async function finishCorrection(){
    isPassed=totalScore>=PASS_SCORE;
    var corr={};results.forEach(function(r,i){corr[i]=r.is_correct;});
    var ans={};words.forEach(function(w,i){ans[i]=results[i].user_answer;});
    var resp=await fetch('/api/past_light/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({answers:ans,corrections:corr})});
    var data=await resp.json();
    if(data.success){results=data.results;totalScore=data.total_score;isPassed=data.is_passed;examData=data;}
    switchStage('s4');renderReport();
}
function renderReport(){
    // 标题
    document.getElementById('rtitle')&&(document.getElementById('rtitle').textContent=isPassed?'🎉 恭喜通过！':'💪 继续加油！');
    // 信息区
    var tc=isPassed?'#2ecc71':'#e74c3c';
    document.getElementById('rinfo').innerHTML=
        '<div class="r-row"><span class="r-label">姓名：</span><span class="r-value">'+USER_NAME+'</span>  <span class="r-label">学号：</span><span class="r-value">'+STUDENT_ID+'</span></div>'+
        '<div class="r-row"><span class="r-label">今日组别：</span><span class="r-value">'+examData.today_group+'</span>  <span class="r-label">版型：</span><span class="r-value">昔日之光</span></div>'+
        '<div class="r-row"><span class="r-label">基础词汇：</span><span class="r-value" style="color:'+tc+';font-weight:bold;font-size:1.1em;">'+totalScore+'/30</span></div>';
    // 照片区
    var ph=isPassed?'<img src="/static/images/通过.png" style="max-width:100%;max-height:110px;" onerror="this.innerHTML=\'<span style=color:#ffd700;font-size:1.5em;>通过</span>\'">':'<img src="/static/images/挂科.png" style="max-width:100%;max-height:110px;" onerror="this.innerHTML=\'<span style=color:#e74c3c;font-size:1.5em;>挂科</span>\'">';
    document.getElementById('rphoto').innerHTML=ph;
    // 单词表 - 15行每行2个单词，8列
    var h='';
    for(var r=0;r<15;r++){
        h+='<tr>';
        for(var c=0;c<2;c++){
            var i=r*2+c;
            if(i<results.length){
                var w=results[i];
                var sc=w.is_correct?'1.00':'0.00';
                var cl=w.is_correct?'td-correct':'td-wrong';
                h+='<td class="'+cl+'">'+w.word+'</td><td style="color:#ffd700;">'+w.pos+'</td><td>'+w.meaning+'</td><td class="td-score '+cl+'">'+sc+'</td>';
            }else{
                h+='<td style="color:#7f8c8d;">-</td><td style="color:#7f8c8d;">-</td><td style="color:#7f8c8d;">-</td><td style="color:#7f8c8d;">-</td>';
            }
        }
        h+='</tr>';
    }
    document.getElementById('rbody').innerHTML=h;
}
function switchStage(id){['s1','s2','s3','s4'].forEach(function(s){document.getElementById(s).classList.toggle('hidden',s!==id);});}

async function exportPNG(){
    var btn=event.target; btn.disabled=true; btn.textContent='生成中...';
    var resp=await fetch('/api/past_light/export_png',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({results:results,total_score:totalScore,is_passed:isPassed,today_group:examData.today_group,user_name:USER_NAME,student_id:STUDENT_ID})});
    var data=await resp.json();
    btn.disabled=false; btn.textContent='📄 导出PNG证书';
    if(data.success&&data.image){var a=document.createElement('a');a.download='昔日之光考试报告.png';a.href='data:image/png;base64,'+data.image;a.click();}
    else{alert('导出失败: '+(data.message||'未知错误'));}
}
</script>
</body>
</html>
