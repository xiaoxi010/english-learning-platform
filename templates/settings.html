<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:"Microsoft YaHei",sans-serif; background:linear-gradient(135deg,#0c0c1d,#1a1a3e); min-height:100vh; color:#fff; }
        .header { background:rgba(0,0,0,0.4); padding:10px 25px; display:flex; justify-content:space-between; align-items:center; }
        .header h1 { font-size:1.3em; color:#ff6b35; }
        .back-btn { color:#aaa; text-decoration:none; padding:6px 14px; border-radius:20px; background:rgba(255,255,255,0.1); }
        .main-wrap { max-width:600px; margin:40px auto; padding:20px; }
        .panel { background:rgba(255,255,255,0.05); border-radius:12px; padding:30px; }
        .panel h2 { color:#ffd700; text-align:center; margin-bottom:25px; font-size:1.5em; }
        .form-group { margin-bottom:20px; }
        .form-group label { display:block; color:#ffd700; margin-bottom:8px; font-weight:bold; }
        .form-group input { width:100%; padding:12px; border-radius:8px; background:#1e1e3a; color:#fff; border:1px solid rgba(255,255,255,0.2); font-size:1em; }
        .form-group input:focus { outline:none; border-color:#ffd700; }
        .btn { padding:12px 30px; border:none; border-radius:8px; cursor:pointer; font-size:1em; font-weight:bold; color:#fff; }
        .btn-save { background:#2ecc71; width:100%; }
        .btn-save:hover { background:#27ae60; }
        .msg { text-align:center; margin-top:15px; font-size:0.9em; }
        .msg.success { color:#2ecc71; }
        .msg.error { color:#e74c3c; }
    </style>
</head>
<body>
<div class="header">
    <h1>⚙️ 设置</h1>
    <a href="/" class="back-btn">← 返回主菜单</a>
</div>
<div class="main-wrap">
    <div class="panel">
        <h2>用户设置</h2>
        <div class="form-group">
            <label>👤 姓名</label>
            <input type="text" id="userName" placeholder="请输入姓名" value="{{ user_name }}">
        </div>
        <div class="form-group">
            <label>🎓 学号</label>
            <input type="text" id="studentId" placeholder="请输入学号" value="{{ student_id }}">
        </div>
        <button class="btn btn-save" onclick="saveSettings()">💾 保存设置</button>
        <div class="msg" id="msg"></div>
    </div>
</div>

<script>
async function saveSettings(){
    var name = document.getElementById('userName').value.trim();
    var sid = document.getElementById('studentId').value.trim();
    if(!name) { showMsg('姓名不能为空', 'error'); return; }
    
    var resp = await fetch('/api/settings/save', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({user_name:name, student_id:sid})
    });
    var d = await resp.json();
    showMsg(d.message, d.success?'success':'error');
}

function showMsg(text, type){
    var m = document.getElementById('msg');
    m.textContent = text;
    m.className = 'msg ' + type;
    setTimeout(function(){ m.textContent=''; m.className='msg'; }, 3000);
}
</script>
</body>
</html>
