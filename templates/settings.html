<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        .main-wrap { max-width:600px; margin:0 auto; padding:20px; }
        .panel { background:var(--bg-card); border:1px solid var(--border-color); border-radius:8px; padding:30px; }
        .panel h2 { color:var(--text-primary); text-align:center; margin-bottom:25px; font-size:1.3em; }
        .form-group { margin-bottom:20px; }
        .form-group label { display:block; color:var(--text-secondary); margin-bottom:8px; font-weight:500; font-size:0.9em; }
        .form-group input { width:100%; padding:12px; border-radius:6px; background:var(--bg-secondary); color:var(--text-primary); border:1px solid var(--border-color); font-size:1em; }
        .form-group input:focus { outline:none; border-color:var(--accent-green); }
        .form-group input:disabled { opacity:0.7; cursor:not-allowed; }
        .credits-box { background:var(--accent-green-dim); border:1px solid var(--border-color); border-radius:8px; padding:16px; text-align:center; margin-bottom:20px; }
        .credits-box .num { font-size:2em; color:var(--accent-green); font-weight:bold; }
        .credits-box .label { color:var(--text-secondary); font-size:0.9em; margin-top:4px; }
        .hint { color:var(--text-secondary); font-size:0.8em; margin-top:6px; }
        .btn { padding:12px 30px; border:none; border-radius:6px; cursor:pointer; font-size:1em; font-weight:600; color:#0d0d0d; }
        .btn-save { background:var(--accent-green); width:100%; }
        .btn-save:hover { opacity:0.88; }
        .msg { text-align:center; margin-top:15px; font-size:0.9em; }
        .msg.success { color:var(--accent-green); }
        .msg.error { color:#f87171; }
    </style>
</head>
<body>
{% set show_sidebar = true %}
{% set active_nav = active_nav | default('settings') %}
{% set page_title = '设置' %}
{% include 'partials/app_shell_open.html' %}
<div class="main-wrap">
    <div class="panel">
        <h2>用户设置</h2>

        <div class="credits-box">
            <div class="num" id="creditsDisplay">{{ credits }}</div>
            <div class="label">💰 剩余积分</div>
        </div>

        <div class="form-group">
            <label for="accountName">账户名称</label>
            <input type="text" id="accountName" value="{{ account_name }}" placeholder="请输入账户名称">
        </div>

        <div class="form-group">
            <label for="accountEmail">账户邮箱</label>
            <input type="email" id="accountEmail" value="{{ account_email }}" disabled>
            <p class="hint">邮箱由登录账号绑定，不可修改</p>
        </div>

        <div class="form-group">
            <label for="studentId">学号</label>
            <input type="text" id="studentId" value="{{ student_id }}" placeholder="请输入学号">
        </div>

        <button class="btn btn-save" onclick="saveSettings()">保存设置</button>
        <div class="msg" id="msg"></div>
    </div>
</div>
{% include 'partials/app_shell_close.html' %}
<script>
async function saveSettings() {
    const accountName = document.getElementById('accountName').value.trim();
    const studentId = document.getElementById('studentId').value.trim();
    const msg = document.getElementById('msg');
    if (!accountName) { msg.textContent = '账户名称不能为空'; msg.className = 'msg error'; return; }
    try {
        const resp = await fetch('/api/settings/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ account_name: accountName, student_id: studentId }),
        });
        const result = await resp.json();
        msg.textContent = result.message;
        msg.className = 'msg ' + (result.success ? 'success' : 'error');
    } catch (e) {
        msg.textContent = '保存失败: ' + e.message;
        msg.className = 'msg error';
    }
}
</script>
</body>
</html>
