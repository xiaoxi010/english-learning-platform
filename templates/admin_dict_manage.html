<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>词库管理后台</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .toolbar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-primary {
            background: #6c5ce7;
            color: white;
        }
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        .btn-success {
            background: #00b894;
            color: white;
        }
        .dict-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }
        .dict-table th, .dict-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .dict-table th {
            background: rgba(0,0,0,0.3);
            font-weight: bold;
        }
        .edit-btn, .delete-btn {
            padding: 5px 10px;
            margin: 0 2px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .edit-btn {
            background: #3498db;
            color: white;
        }
        .delete-btn {
            background: #e74c3c;
            color: white;
        }
        .inline-edit {
            width: 80px;
            padding: 5px;
            border: 1px solid #6c5ce7;
            border-radius: 4px;
            background: #12122a;
            color: white;
        }
        .inline-edit-large {
            width: 200px;
            padding: 5px;
            border: 1px solid #6c5ce7;
            border-radius: 4px;
            background: #12122a;
            color: white;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1e1e3a;
            padding: 30px;
            border-radius: 15px;
            width: 500px;
            max-width: 90%;
        }
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #444;
            border-radius: 5px;
            background: #12122a;
            color: white;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #aaa;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1>📚 词库管理后台</h1>
        
        <div class="toolbar">
            <button class="btn btn-primary" onclick="showAddModal()">➕ 添加词典</button>
            <button class="btn btn-primary" onclick="showImportModal()">📎 从 Excel 导入</button>
            <button class="btn btn-primary" onclick="loadDicts()">🔄 刷新</button>
            <a href="{{ url_for('index') }}" class="btn" style="background:#555; text-decoration:none;">← 返回首页</a>
        </div>
        
        <table class="dict-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>词典名称</th>
                    <th>描述</th>
                    <th>价格(积分)</th>
                    <th>单词数</th>
                    <th>图标</th>
                    <th>排序</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="dictTableBody">
                <tr><td colspan="8">加载中...</td></tr>
            </tbody>
        </table>
    </div>
    
    <div id="addModal" class="modal">
        <div class="modal-content">
            <h2>添加词典</h2>
            <input type="text" id="newDictName" placeholder="词典名称">
            <textarea id="newDictDesc" placeholder="描述" rows="3"></textarea>
            <input type="number" id="newDictPrice" placeholder="价格" value="0">
            <input type="number" id="newDictWordCount" placeholder="单词数" value="0">
            <input type="text" id="newDictIcon" placeholder="图标" value="📚">
            <input type="number" id="newDictSortOrder" placeholder="排序" value="0">
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-success" onclick="addDict()">添加</button>
                <button class="btn" onclick="closeAddModal()">取消</button>
            </div>
        </div>
    </div>
    
    <div id="importModal" class="modal">
        <div class="modal-content">
            <h2>从 Excel 导入</h2>
            <p>Excel 需要包含列：词典名称、描述</p>
            <input type="file" id="excelFile" accept=".xlsx,.xls">
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-success" onclick="importExcel()">导入</button>
                <button class="btn" onclick="closeImportModal()">取消</button>
            </div>
        </div>
    </div>
    
    <script>
        let currentData = [];
        
        async function loadDicts() {
            const resp = await fetch('/api/admin/dict_shop/list');
            const result = await resp.json();
            if (result.success) {
                currentData = result.data;
                renderTable();
            }
        }
        
        function renderTable() {
            const tbody = document.getElementById('dictTableBody');
            if (!currentData.length) {
                tbody.innerHTML = '<tr><td colspan="8">暂无数据</td></tr>';
                return;
            }
            tbody.innerHTML = currentData.map(d => `
                <tr>
                    <td>${d.id}</td>
                    <td><strong>${escapeHtml(d.dict_name)}</strong></td>
                    <td><input type="text" class="inline-edit-large" id="desc_${d.id}" value="${escapeHtml(d.description || '')}"></td>
                    <td><input type="number" class="inline-edit" id="price_${d.id}" value="${d.price}"></td>
                    <td>${d.word_count}</td>
                    <td><input type="text" class="inline-edit" id="icon_${d.id}" value="${escapeHtml(d.icon || '📚')}"></td>
                    <td><input type="number" class="inline-edit" id="sort_${d.id}" value="${d.sort_order}"></td>
                    <td>
                        <button class="edit-btn" onclick="saveRow(${d.id})">保存</button>
                        <button class="delete-btn" onclick="deleteDict(${d.id})">删除</button>
                    </td>
                </tr>
            `).join('');
        }
        
        async function saveRow(id) {
            const data = {
                id: id,
                description: document.getElementById(`desc_${id}`).value,
                price: parseInt(document.getElementById(`price_${id}`).value) || 0,
                icon: document.getElementById(`icon_${id}`).value,
                sort_order: parseInt(document.getElementById(`sort_${id}`).value) || 0
            };
            const resp = await fetch('/api/admin/dict_shop/update', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const result = await resp.json();
            alert(result.message);
            if (result.success) loadDicts();
        }
        
        async function deleteDict(id) {
            if (!confirm('确定删除？')) return;
            const resp = await fetch('/api/admin/dict_shop/delete', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id: id})
            });
            const result = await resp.json();
            alert(result.message);
            if (result.success) loadDicts();
        }
        
        function showAddModal() {
            document.getElementById('addModal').style.display = 'flex';
        }
        
        function closeAddModal() {
            document.getElementById('addModal').style.display = 'none';
        }
        
        async function addDict() {
            const data = {
                dict_name: document.getElementById('newDictName').value.trim(),
                description: document.getElementById('newDictDesc').value,
                price: parseInt(document.getElementById('newDictPrice').value) || 0,
                word_count: parseInt(document.getElementById('newDictWordCount').value) || 0,
                icon: document.getElementById('newDictIcon').value,
                sort_order: parseInt(document.getElementById('newDictSortOrder').value) || 0
            };
            if (!data.dict_name) {
                alert('请输入词典名称');
                return;
            }
            const resp = await fetch('/api/admin/dict_shop/add', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const result = await resp.json();
            alert(result.message);
            if (result.success) {
                closeAddModal();
                loadDicts();
            }
        }
        
        function showImportModal() {
            document.getElementById('importModal').style.display = 'flex';
        }
        
        function closeImportModal() {
            document.getElementById('importModal').style.display = 'none';
        }
        
        async function importExcel() {
            const file = document.getElementById('excelFile').files[0];
            if (!file) {
                alert('请选择文件');
                return;
            }
            const formData = new FormData();
            formData.append('file', file);
            const resp = await fetch('/api/admin/dict_shop/import_excel', {
                method: 'POST',
                body: formData
            });
            const result = await resp.json();
            alert(result.message);
            if (result.success) {
                closeImportModal();
                loadDicts();
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        loadDicts();
    </script>
</body>
</html>
